<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Noise Meter</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  max-width: 1000px;
  margin: auto;
  background: #fafafa;
}
.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  align-items: start;
  min-width: 300px;
}
.column {
  background: #f0f0f0;
  border-radius: 8px;
  padding: 8px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  font-size: clamp(10px, 1.8vw, 16px);
  word-wrap: break-word;
  overflow-wrap: anywhere;
}
h1 {
  text-align: left;
  margin-bottom: 20px;
  font-size: 24px;
}
.sound-button {
  background-color: #2b5d84;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 8px;
  cursor: pointer;
  text-align: left;
  font-size: clamp(10px, 1.6vw, 14px);
  transition: background-color 0.3s;
}
.sound-button:hover {
  background-color: #1f4563;
}
.footer-note {
  font-size: 8px;
  text-align: center;
  color: #555;
  margin-top: 30px;
}
@media (max-width: 480px) {
  .container { gap: 5px; }
  .column { padding: 6px; }
}
</style>
</head>

<body>
  <h1>Sound Board</h1>

  <div class="container" id="soundBoardContainer"></div>

  <div class="footer-note copyright">
    &copy; 2026 Perfectly Practical English™. All rights reserved.
  </div>

<script>
  // ====== Your file list ======
  const rawText = `
applause-236785.mp3
beautiful-church-chorus-175359.mp3
beepbeepbeep-53921.mp3
birds-chirping-241045.mp3
boing-101318.mp3
buzzer-1-181412.mp3
car-crash-sound-effect-376874.mp3
cash-register-kaching-376867.mp3
cat-meow-401729.mp3
censor-beep-1-372459.mp3
classical-piano-loop-70256.mp3
clock-ticking-down-376897.mp3
countdown-beep-377323.mp3
cow-moo-339729.mp3
crowd-cheering-383111.mp3
ding-411634.mp3
door-slam-172171.mp3
dry-thunder-364468.mp3
flying-saucer-414427.mp3
frog-croaking-sound-effect-322956.mp3
ghost-moan-83902.mp3
horse-neigh-390297.mp3
i-see-you-creepy-ghost-whisper-401711.mp3
jazz-saxophone-loop-281746.mp3
long-buzzer-38398.mp3
loud-explosion-425457.mp3
machinery_bq-76425.mp3
monster-growl-390285.mp3
ocean-waves-376898.mp3
pop-rock-music-loop-398658.mp3
retro-space-sounds-1-176205.mp3
retro-space-sounds-3-176206.mp3
rock-cinematic-161648.mp3
slide-whistle-up-326154.mp3
slow-cinematic-clock-ticking-405471.mp3
soothing-ocean-waves-372489.mp3
synth-banjo-14463.mp3
t-rex-growl-324746.mp3
whistle-slide-down-03-352451.mp3
wind-blowing-sfx-01-423673.mp3
wine-glass-clink-36036.mp3
winner-bell-game-show-91932.mp3
wolf-howl-359873.mp3
`; // add more as needed

  // ====== Pretty label helper ======
  function prettyLabel(filename) {
    let name = filename.replace(/\.[^/.]+$/, '');
    name = name.replace(/-\d+$/, '');
    name = name.replace(/-/g, ' ');
    name = name.replace(/\b\w/g, c => c.toUpperCase());
    return name;
  }

  // ====== Create buttons with toggle audio ======
  const lines = rawText.trim().split('\n')
    .map(l => l.replace(/[\u200B-\u200D\uFEFF]/g, '').trim())
    .filter(Boolean);

  const half = Math.ceil(lines.length / 2);
  const columns = [lines.slice(0, half), lines.slice(half)];
  const container = document.getElementById('soundBoardContainer');

  // Store Audio objects for toggle
  const audioMap = new Map();

  columns.forEach(colLines => {
    const colDiv = document.createElement('div');
    colDiv.className = 'column';

    colLines.forEach(file => {
      const cleanFile = file.trim();
      const btn = document.createElement('button');
      btn.className = 'sound-button';
      btn.textContent = prettyLabel(cleanFile);

      // Create Audio object
      const audio = new Audio(cleanFile);
      audio.volume = 1; // full volume
      audioMap.set(cleanFile, audio);

      let fadeInterval = null;

      btn.addEventListener('click', () => {
        if (audio.paused) {
          // Start playback if not playing
          audio.currentTime = 0;
          audio.volume = 1;
          audio.play().catch(err => console.error(err));
        } else {
          // Fade out & stop if already playing
          if (fadeInterval) clearInterval(fadeInterval);
          fadeInterval = setInterval(() => {
            audio.volume = Math.max(0, audio.volume - 0.05);
            if (audio.volume <= 0) {
              audio.pause();
              audio.currentTime = 0;
              clearInterval(fadeInterval);
            }
          }, 50); // 50ms per step, fade duration ~1s
        }
      });

      colDiv.appendChild(btn);
    });

    container.appendChild(colDiv);
  });
</script>

<script>
// ---------------- Green Border ----------------
const borderDiv = document.createElement('div');
borderDiv.style.position = 'fixed';
borderDiv.style.inset = '0';
borderDiv.style.border = '10px solid #39FF14';
borderDiv.style.boxSizing = 'border-box';
borderDiv.style.zIndex = '9999';
borderDiv.style.pointerEvents = 'none';
borderDiv.style.backgroundColor = 'transparent';
document.body.appendChild(borderDiv);
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
</html>
