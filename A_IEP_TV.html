<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IEP TV – Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe
  src="https://meet.jit.si/IEP_TV
    #config.prejoinPageEnabled=false
    &config.startWithAudioMuted=true
    &config.startWithVideoMuted=true
    &config.disableDeepLinking=true
    &config.requireDisplayName=false
    &interfaceConfig.DISABLE_JOIN_LEAVE_NOTIFICATIONS=true
    &interfaceConfig.SHOW_JITSI_WATERMARK=false
    &interfaceConfig.SHOW_WATERMARK_FOR_GUESTS=false"
  allow="autoplay; fullscreen"
></iframe>


<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
</html>
