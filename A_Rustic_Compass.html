<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rustic Compass</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #d8c3a5;
    font-family: Georgia, serif;
  }

  .compass {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, #e6d3b3, #bfa37a);
    border: 6px solid #8b6b4f;
    box-shadow: inset 0 0 25px rgba(0,0,0,0.35), 0 12px 30px rgba(0,0,0,0.4);
    position: relative;
  }

  .compass::before {
    content: "";
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    border: 2px dashed rgba(90,70,50,0.5);
  }

  .directions {
    position: absolute;
    width: 100%;
    height: 100%;
    color: #5a4632;
    font-weight: bold;
  }

  .north { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); }
  .south { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); }
  .east  { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); }
  .west  { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }

  /* Needle */
  .needle {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 10px;
    height: 150px;
    transform: translate(-50%, -50%) rotate(0deg);
    transform-origin: center;
  }

  .needle::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 50%;
    top: 0;
    background: #b33a2b;
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  }

  .needle::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 50%;
    bottom: 0;
    background: #5a4632;
    clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
  }

  .center {
    width: 14px;
    height: 14px;
    background: #5a4632;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .button {
    position: absolute;
    bottom: -70px;
    left: 50%;
    transform: translateX(-50%);
    background: #8b6b4f;
    color: #f5f0e6;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-family: Georgia, serif;
  }

  .status {
    position: absolute;
    bottom: -105px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: #5a4632;
  }
</style>
</head>

<body>

<div class="compass">
  <div class="directions">
    <div class="north">N</div>
    <div class="south">S</div>
    <div class="east">E</div>
    <div class="west">W</div>
  </div>

  <div class="needle" id="needle"></div>
  <div class="center"></div>

  <button class="button" onclick="startCompass()">Enable Compass</button>
  <div class="status" id="status">Tap to enable</div>
</div>

<script>
let currentAngle = 0;
let running = false;

/* START */
async function startCompass() {
  const status = document.getElementById("status");

  try {
    // iOS permission
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
      const permission = await DeviceOrientationEvent.requestPermission();

      if (permission !== "granted") {
        status.innerText = "Permission denied";
        return;
      }
    }

    if (!running) {
      window.addEventListener("deviceorientation", handleOrientation);
      running = true;
      status.innerText = "Compass active";
    }

  } catch (e) {
    console.error(e);
    status.innerText = "Failed to start";
  }
}

/* SENSOR HANDLING (portrait-only optimized) */
function handleOrientation(event) {
  let heading;

  if (event.webkitCompassHeading !== undefined) {
    heading = event.webkitCompassHeading; // iOS (best)
  } 
  else if (event.alpha !== null) {
    heading = 360 - event.alpha; // fallback (portrait)
  } 
  else {
    return;
  }

  // Normalize
  heading = (heading + 360) % 360;

  // Smooth motion
  currentAngle = currentAngle * 0.85 + heading * 0.15;

  rotateNeedle(currentAngle);
}

/* ROTATION */
function rotateNeedle(angle) {
  const needle = document.getElementById("needle");
  needle.style.transform = `translate(-50%, -50%) rotate(${-angle}deg)`;
}
</script>

</body>
</html>
