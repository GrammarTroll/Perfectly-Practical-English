<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise Monitor</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f0f8ff;
  padding: 20px;
}

#noise-bar {
  width: 300px; /* Adjust this to match the width of the sliders */
  max-width: 100%; /* Ensure it doesn't stretch beyond the available width */
  height: 30px;
  margin: 20px auto;
  background: #ddd;
  border-radius: 15px;
  position: relative;
  overflow: hidden;
}

#noise-bar::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to right,
    transparent 0%,
    transparent 9%,
    rgba(0,0,0,0.2) 9.5%,
    transparent 10%
  );
  pointer-events: none;
}

#noise-fill {
  height: 100%;
  width: 50%;
  background: green;
  border-radius: 15px;
  transition: width 0.05s linear, background 0.1s linear;
}

#status {
  font-size: 1.2em;
  margin-top: 10px;
  font-weight: bold;
}

.controls { margin-top: 15px; }
label { margin-right: 10px; }
input[type="range"] { width: 300px; margin-top: 10px; }

#startBtn, #modalBtn {
  background-color: #4a90e2;
  color: white;
  font-size: 1.1em;
  padding: 10px 22px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
  transition: background-color 0.2s, transform 0.1s;
  margin-top: 10px;
}
#startBtn:hover, #modalBtn:hover { background-color: #357ab7; transform: scale(1.05); }
#startBtn:active, #modalBtn:active { transform: scale(0.98); }

#noiseModal {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 200px;
  height: 200px;
  transform: translate(-50%, -50%);
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

#noiseCanvas { width: 180px; height: 180px; }
</style>
</head>
<body>

<button id="startBtn">🎤 Start Monitor</button>
<button id="modalBtn">📊 Noise Gauge</button>

<div id="noise-bar"><div id="noise-fill"></div></div>
<div id="status">Waiting to start</div>

<div class="controls">
  <label for="sensitivity">Meter Sensitivity:</label>
  <input type="range" id="sensitivity" min="0.1" max="5" step="0.01"> <!-- Decreased range for sensitivity -->
  <br><br>
  <label for="threshold">Warning Threshold:</label>
  <input type="range" id="threshold" min="0.005" max="0.05" step="0.01"> <!-- Lowered threshold range -->
</div>

<div id="noiseModal">
  <canvas id="noiseCanvas" width="180" height="180"></canvas>
</div>

<script>
const startBtn = document.getElementById("startBtn");
const modalBtn = document.getElementById("modalBtn");
const noiseModal = document.getElementById("noiseModal");
const canvas = document.getElementById("noiseCanvas");
const ctx = canvas.getContext("2d");
const fill = document.getElementById("noise-fill");
const status = document.getElementById("status");
const sensitivitySlider = document.getElementById("sensitivity");
const thresholdSlider = document.getElementById("threshold");

// Noise parameters
const baselineRms = 0.001;
let smoothedLevel = 0;
let smoothing = 0.25;
let spikeIgnore = 0.003;
let warningTimer = 0;
const warningHoldFrames = 180;

// Set sliders to middle position on page load
sensitivitySlider.value = (parseFloat(sensitivitySlider.min) + parseFloat(sensitivitySlider.max)) / 2;
thresholdSlider.value = (parseFloat(thresholdSlider.min) + parseFloat(thresholdSlider.max)) / 2;

// Adjust sensitivity and threshold factors (further reduced sensitivity for quieter speech)
let sensitivityFactor = 1.00001; // Even lower sensitivity for quieter sounds
let threshold = 0.05; // Adjusted for louder speech, while avoiding noise

// Recalculate the adjustment relative to the middle of each slider
sensitivitySlider.addEventListener("input", e => {
  sensitivityFactor = parseFloat(e.target.value) * 1.00001; // Adjust based on new slider value
});

thresholdSlider.addEventListener("input", e => {
  threshold = parseFloat(e.target.value) * 0.05; // Adjust based on new slider value
});

// Modal toggle
modalBtn.addEventListener("click", () => { noiseModal.style.display = "flex"; });

// Draw gauge modal
let redIntensity = 0;
function drawDial(level) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2, cy = canvas.height / 2, radius = 80;

  // Base circle
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
  ctx.fillStyle = "#eee";
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#000";
  ctx.stroke();

  // Green left half + pulse
  const greenPulse = 0.05 * (Math.random() - 0.5);
  const greenEndAngle = Math.PI + Math.PI * 0.5 * (0.5 + greenPulse);
  ctx.beginPath();
  ctx.arc(cx, cy, radius, Math.PI, greenEndAngle, false);
  ctx.lineWidth = 10;
  ctx.lineCap = "round";
  ctx.strokeStyle = "green";
  ctx.stroke();

  // Red tip only on right half if above threshold
  if (level > threshold) redIntensity = 1;
  else redIntensity *= 0.95;
  if (redIntensity > 0) {
    ctx.beginPath();
    const redStart = greenEndAngle;
    const redEnd = Math.min(Math.PI * 2, greenEndAngle + Math.PI * 0.35 * redIntensity);
    ctx.arc(cx, cy, radius, redStart, redEnd, false);
    ctx.lineWidth = 10;
    ctx.lineCap = "round";
    ctx.strokeStyle = `rgba(255,0,0,${redIntensity})`;
    ctx.stroke();
  }
}

// Start monitoring
startBtn.addEventListener("click", async () => {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    status.textContent = "Microphone not supported ❌";
    alert("This browser does not support microphone access.");
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") await audioCtx.resume();
    const source = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    const buffer = new Float32Array(analyser.fftSize);
    source.connect(analyser);

    status.textContent = "Listening…";

    function update() {
      analyser.getFloatTimeDomainData(buffer);
      let sum = 0;
      for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
      let rms = Math.sqrt(sum / buffer.length);

      let level = Math.max(0, rms - baselineRms) * sensitivityFactor;
      if (level < spikeIgnore) level = 0;
      level = Math.min(level, 1);
      smoothedLevel += smoothing * (level - smoothedLevel);

      // Mercury fill
      const midPercent = 0.5; // green always starts at midpoint
      const greenPulse = (Math.random() * 0.04 - 0.02);
      let redTip = 0;
      const redThresholdPercent = midPercent + 0.06; // ~10-20px past center
      if (smoothedLevel > threshold) redTip = (smoothedLevel - threshold) * 1.8;

      let totalFill = midPercent + greenPulse + redTip;
      totalFill = Math.min(totalFill, 1);

      fill.style.width = (totalFill * 100) + "%";
      fill.style.borderRadius = "15px";

      if (totalFill > redThresholdPercent) {
        fill.style.background = `linear-gradient(to right, green ${(midPercent + greenPulse) * 100}%, red 100%)`;
        status.textContent = "Warning: Too Loud!";
        warningTimer = warningHoldFrames;
      } else {
        fill.style.background = "green";
        status.textContent = "Normal";
      }
      if (warningTimer > 0) warningTimer--;

      drawDial(smoothedLevel);
      requestAnimationFrame(update);
    }

    update();
  } catch (err) {
    status.textContent = "Microphone access denied ❌";
    alert("Please allow microphone access in your browser settings.");
    console.error("Microphone error:", err);
  }
});
</script>

<script>
// Neon green border
const borderDiv = document.createElement("div");
borderDiv.style.position = "fixed"; borderDiv.style.inset = "0";
borderDiv.style.border = "10px solid #39FF14"; borderDiv.style.boxSizing = "border-box";
borderDiv.style.zIndex = "9999"; borderDiv.style.pointerEvents = "none";
document.body.appendChild(borderDiv);
</script>


<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
</html>
