/* Up / Down buttons: square */

  padding: 0 10px;

/* Wheel text inside selector */

  flex: 1;
  font-size: 14px;
  line-height: normal;        /* critical to prevent vertical jump */
  min-height: 1em;            /* critical for stable height */
  white-space: nowrap;
  overflow: hidden;

  user-select: none;
  pointer-events: none;
}

<script>
// ---------------------- SCRAMBLE ----------------------
const scrambleQuestionsSource = `

~Bigfoot~

A group of campers find strange footprints in the forest.
They decide to follow the footprints carefully.
They walk deeper between the tall trees.
Suddenly, they hear a loud, mysterious howl nearby.
Then they see Bigfoot peeking out at them from behind a tree.

~Nessie~

A group of divers find strange bubbles in the water.
They decide to follow the bubbles carefully.
They dive deeper to the bottom of the sea.
Suddenly, they hear a loud, mysterious roar nearby.
Then they see Nessie peeking out at them from a cave.

`;

const scrambleContainer = document.getElementById('scrambleContainer');

function showScrambleSentence(index) {
  const rows = scrambleContainer.querySelectorAll('.exercise');
  if (!rows.length) return;

  window.SCRAMBLE_SENTENCE_INDEX =
    Math.max(0, Math.min(index, rows.length - 1));

  rows.forEach((row, i) => {
    row.style.display =
      i === window.SCRAMBLE_SENTENCE_INDEX ? 'block' : 'none';
  });
}


/* ===============================
   SCRAMBLE CORE ENGINE
   =============================== */

// ---- PARSE SECTIONS ----
function parseScrambleSections(raw) {
  const lines = raw.split('\n').map(l => l.trim());
  const sections = [];
  let current = null;

  lines.forEach(line => {
    if (!line) return;

    if (line.startsWith("~")) {
      current = {
        title: line.replace(/~/g, '').trim(),
        lines: []
      };
      sections.push(current);
    } else if (current) {
      current.lines.push(line);
    }
  });

  return sections;
}

// ---- GLOBAL SCRAMBLE STATE (LOCKED ORDER) ----
window.SCRAMBLE_SECTIONS = parseScrambleSections(scrambleQuestionsSource);
window.SCRAMBLE_INDEX = 0;               // 🔒 authoritative index
window.ACTIVE_SCRAMBLE = null;
window.SCRAMBLE_SENTENCE_INDEX = 0;
let scrambleQuestions = [];


// ---- RENDER FUNCTION ----
window.renderScrambleForSection = function(index) {



  scrambleContainer.innerHTML = '';

  const section = SCRAMBLE_SECTIONS[index];
  if (!section) return;

  window.ACTIVE_SCRAMBLE = section;
scrambleQuestions = [...section.lines];

  section.lines.forEach((sentence, i) => {
    const row = document.createElement('div');
    row.className = 'exercise';

    const tokens = sentence.match(/[\w'-]+|[.,!?;:"“”‘’()]/g) || [];
    const words = tokens
      .filter(t => /\w/.test(t))
      .sort(() => Math.random() - 0.5);

    row.innerHTML = `<strong>${i + 1}. </strong>`;

    tokens.forEach(tok => {
      const span = document.createElement('span');

      if (/\w/.test(tok)) {
        span.textContent = words.shift();
        span.className = 'word tile';

      } else {
        span.textContent = tok;
      }

      row.appendChild(span);
      row.appendChild(document.createTextNode(' '));
    });

    scrambleContainer.appendChild(row);
  });

// 🔒 show first sentence
window.SCRAMBLE_SENTENCE_INDEX = 0;

showScrambleSentence(0);

// 🔥 ACTIVATE SCRAMBLE LOGIC
enableScrambleInteraction();
};

function enableScrambleInteraction() {
  let selectedWord = null;

  scrambleContainer.addEventListener('click', e => {
    const word = e.target.closest('.word.tile');
    if (!word) return;

    // first click → select
    if (!selectedWord) {
      selectedWord = word;
      word.classList.add('selected-word');
      return;
    }

    // clicking same word → deselect
    if (word === selectedWord) {
      word.classList.remove('selected-word');
      selectedWord = null;
      return;
    }

    // second click → swap
    const a = selectedWord;
    const b = word;

    const aNext = a.nextSibling === b ? a : a.nextSibling;
    const bNext = b.nextSibling === a ? b : b.nextSibling;

    const aParent = a.parentNode;

    aParent.insertBefore(b, aNext);
    aParent.insertBefore(a, bNext);

    a.classList.remove('selected-word');
    selectedWord = null;
  });
}











  // ✅ Enable submit AFTER render (inline version)
  const nameInput = document.getElementById('scrambleName');
  const idInput = document.getElementById('scrambleId');
  const submitBtn = document.getElementById('scrambleSubmitBtn');

  function checkEnableSubmit() {
    submitBtn.disabled = !(nameInput.value.trim() && idInput.value.trim());
  }
  nameInput.addEventListener('input', checkEnableSubmit);
  idInput.addEventListener('input', checkEnableSubmit);
  checkEnableSubmit(); // initialize state

// ---------------------- SUBMIT ----------------------
document.getElementById('scrambleSubmitBtn').addEventListener('click', () => {
  const filename = window.location.pathname.split('/').pop();
  const nm = document.getElementById('scrambleName').value.trim();
  const id = document.getElementById('scrambleId').value.trim();

  const dateStr = new Date().toLocaleString('en-GB', {
    day: '2-digit',
    month: '2-digit',
    year: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  });

  // Only divs with word tiles
  const divs = Array.from(scrambleContainer.children).filter(div => div.querySelector('.word')
);
  const correctSentences = scrambleQuestions.map(
    s => s.match(/[\w'-]+|[.,!?;:"“”‘’()]/g) || []
  );

  let score = 0;

  divs.forEach((div, i) => {
    const userWords = Array.from(div.querySelectorAll('.word')
).map(t => t.textContent);
    const correctWords = correctSentences[i].filter(t => /\w/.test(t));
    if (
      userWords.length === correctWords.length &&
      userWords.every((w, idx) => w === correctWords[idx])
    ) score++;
  });

  const percentScramble = divs.length
    ? ((score / divs.length) * 100).toFixed(1)
    : '0.0';

  const scoreText = `${filename}|Scramble|${nm}|${id}|${dateStr}|${score}/${divs.length}|${percentScramble}%`;

  const scoreOutput = document.getElementById('scrambleScoreOutput');
  scoreOutput.textContent = scoreText;
  document.getElementById('scrambleScoreboard').style.display = 'block';
  document.getElementById('scrambleSubmitBtn').disabled = true;
});

// Copy / download
setupCopyDownload(
  document.getElementById('scrambleScoreOutput'),
  document.getElementById('scrambleCopyBtn'),
  document.getElementById('scrambleDownloadTextBtn'),
  document.getElementById('scrambleDownloadPngBtn'),
  'scramble_score'
);
</script>


<script>
    let showOverlayNumber = false;

// ===== SECTION SELECTOR SHARED REFERENCES =====
let wheelEl = null;
let startBtn = null;



    const rawImageList = `


~Mars Attacks

01.jpg
04.jpg
08 B.jpg
10.jpg
11.jpg
19.jpg
32.jpg
36.jpg
46.jpg
47.jpg
48.jpg

54.jpg

~Komatsuzaki

01. komatsuzaki_1_large.jpg
02. komatsuzaki_2_large.jpg
03. komatsuzaki_3.jpg
04. komatsuzaki_16_large.jpg
05. komatsuzaki_17_large.jpg
05. komatsuzaki_19_large.jpg
06. komatsuzaki_21_large.jpg
07. komatsuzaki_24_large.jpg
08. komatsuzaki_25_large.jpg
09. komatsuzaki_26_large.jpg
10. komatsuzaki_28_large.jpg
12. 11. komatsuzaki_31_large.jpg
13. komatsuzaki_32_large.jpg
14. komatsuzaki_33_large.jpg
15. komatsuzaki_35_large.jpg


`;

    function parseImageSections(raw) {
  const lines = raw.split('\n').map(l => l.trim());
  const sections = [];
  let current = null;

  lines.forEach(line => {
    if (!line) return;

    if (line.startsWith("~")) {
      current = {
        title: line.replace(/~/g, "").trim(),
        images: []
      };
      sections.push(current);
    } else if (current) {
      current.images.push(line);
    }
  });

  return sections;
}

const imageSections = parseImageSections(rawImageList);

let sectionIndex = 0;
let activeSection = null;
let images = [];

// 🔒 PRESELECT SCRAMBLE SECTION 0
if (window.SCRAMBLE_SECTIONS?.length) {
  window.SCRAMBLE_INDEX = 0;
}

wheelEl  = document.getElementById('sectionWheel');
startBtn = document.getElementById('sectionStart');

const sectionUpBtn   = document.getElementById('sectionUp');
const sectionDownBtn = document.getElementById('sectionDown');

if (!wheelEl || !startBtn || !sectionUpBtn || !sectionDownBtn) {
  console.error('Section selector elements missing');
} else {
  updateSectionWheel(); // ✅ NOW IT RUNS
}
// shows "Komatsuzaki (15 images)"

  // --- UP / DOWN HANDLERS ---
  sectionUpBtn.addEventListener('click', () => {
    sectionIndex--;
    updateSectionWheel();
  });

  sectionDownBtn.addEventListener('click', () => {
    sectionIndex++;
    updateSectionWheel();
  });

  // --- START HANDLER ---
startBtn.addEventListener('click', () => {
  activeSection = imageSections[sectionIndex];
  images = activeSection.images;

  currentImageIndex = 0;
  morphStep = 0;
  isPaused = false;

  // Show scramble
  SCRAMBLE_INDEX = sectionIndex;
  renderScrambleForSection(SCRAMBLE_INDEX);
  scrambleContainer.classList.remove('hidden');

  // Load first image
  loadImages();

  // 🔥 FORCE ENABLE CONTROLS (single source of truth)
  const controls = ['backButton', 'pauseButton', 'nextButton'];
  controls.forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = false;
  });

  // Reset pause label
  document.getElementById('pauseButton').textContent = 'Pause';
});

          // ✅ NOW SAFE





function updateSectionWheel() {
  if (!wheelEl) return;

  // No sections loaded → show placeholder
  if (!Array.isArray(imageSections) || imageSections.length === 0) {
    wheelEl.textContent = "Select a category.";
    startBtn.disabled = true;
    return;
  }

  // Wrap section index
  sectionIndex =
    ((sectionIndex % imageSections.length) + imageSections.length) %
    imageSections.length;

  const section = imageSections[sectionIndex];

  // Invalid section → show placeholder
  if (!section || !section.title || !Array.isArray(section.images)) {
    wheelEl.textContent = "Select a category.";
    startBtn.disabled = true;
    return;
  }

  // Valid section → show title + count
  wheelEl.textContent =
    `${section.title} (${section.images.length} images)`;

  startBtn.disabled = false;
}

// Initialize wheel text on page load
if (wheelEl) wheelEl.textContent = "Select a category.";


    let currentImageIndex = 0;
let isPaused = true;   // 🔥 start paused until Start is clicked
let morphStep = 0;
    const totalSteps = 20, morphingSpeed = 50, displayTime = 120000;
    let morphingInterval, displayTimeout, timerInterval, imageElements = [], timeLeft = displayTime/1000;

    const canvas = document.getElementById('morphCanvas');
    const ctx = canvas.getContext('2d');
    const overlayNumber = document.getElementById('overlayNumber');
    const responsesDiv = document.getElementById('responses');
    const pauseButton = document.getElementById('pauseButton');
    const countdownOverlay = document.createElement('div');
    countdownOverlay.className = 'countdownOverlay';
    let interactionAllowed = false;

    

    function updateOverlay(index) {
      overlayNumber.style.display = showOverlayNumber ? "block" : "none";
      overlayNumber.textContent = index + 1;
    }

    function attachTimerToActiveField(index) {
      const activeInput = document.getElementById(`response${index+1}`);
      if(!activeInput) return;
      if(countdownOverlay.parentElement) countdownOverlay.parentElement.removeChild(countdownOverlay);
      activeInput.insertAdjacentElement("afterend", countdownOverlay);
    }

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = displayTime / 1000;
      updateTimer();
      timerInterval = setInterval(() => {
        if(!isPaused) {
          timeLeft--;
          updateTimer();
          if(timeLeft <= 0) clearInterval(timerInterval);
        }
      }, 1000);
    }

    function updateTimer() {
      const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
      const s = String(timeLeft%60).padStart(2,'0');
      countdownOverlay.textContent = `${m}:${s}`;
    }

    function loadImages() {
      const promises = images.map(src => new Promise(res => {
        const img = new Image();
        img.src = src.trim();

        img.onload = () => res(img);
        img.onerror = () => res(new Image());
      }));

      Promise.all(promises).then(loaded => {
        imageElements = loaded;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(imageElements[0],0,0,canvas.width,canvas.height);
        updateOverlay(0);
        attachTimerToActiveField(0);
        startTimer();
        // displayTimeout = setTimeout(startMorphing, displayTime);

      });
    }

    function morphImages() {
      if(isPaused) return;
      const current = imageElements[currentImageIndex];
      const next = imageElements[(currentImageIndex + 1) % images.length];
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const alpha = morphStep / totalSteps;
      ctx.globalAlpha = 1 - alpha;
      ctx.drawImage(current,0,0,canvas.width,canvas.height);
      ctx.globalAlpha = alpha;
      ctx.drawImage(next,0,0,canvas.width,canvas.height);
      morphStep++;
      if(morphStep >= totalSteps) {
        clearInterval(morphingInterval);
        morphStep = 0;
        currentImageIndex = (currentImageIndex + 1) % images.length;
        showImage(currentImageIndex);
      }
    }

function showImage(index) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = 1;
  ctx.drawImage(imageElements[index], 0, 0, canvas.width, canvas.height);

  updateOverlay(index);
  renderMCForImage(index);   // MC synced to image

  // restart timer + morphing
  startTimer();
  clearTimeout(displayTimeout);
  displayTimeout = setTimeout(startMorphing, displayTime);
}

    function startMorphing() {
      morphingInterval = setInterval(morphImages, morphingSpeed);
    }

function fadeToImage(targetIndex) {
  clearInterval(morphingInterval);
  clearTimeout(displayTimeout);

  let step = 0;
  const current = imageElements[currentImageIndex];
  const next = imageElements[targetIndex];

  const fadeInterval = setInterval(() => {
    const alpha = step / totalSteps;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.globalAlpha = 1 - alpha;
    ctx.drawImage(current,0,0,canvas.width,canvas.height);
    ctx.globalAlpha = alpha;
    ctx.drawImage(next,0,0,canvas.width,canvas.height);
    step++;

    if(step > totalSteps) {
      clearInterval(fadeInterval);
      currentImageIndex = targetIndex;
      ctx.globalAlpha = 1;
      ctx.drawImage(next,0,0,canvas.width,canvas.height);

      updateOverlay(currentImageIndex);
      renderMCForImage(currentImageIndex);
      startTimer();
      displayTimeout = setTimeout(startMorphing, displayTime);
    }
  }, morphingSpeed);
}

    pauseButton.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseButton.textContent = isPaused ? 'Resume' : 'Pause';
      if(isPaused) {

        clearTimeout(displayTimeout);
      } else {
        displayTimeout = setTimeout(startMorphing, displayTime);
      }
    });

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;

<script>

(function(){

/* =========================
   RAW INSTRUCTIONS TEXT
========================= */

const RAW_TEXT = `

How to play...

1. Enter Name and ID.
2. Select a category.
3. Click Start to begin.
4. Arrange the words in the correct order.
5. Click Next for the next exercise.
6. Click Back to go to the previous exercise.
7. Click Submit to see your score.
8. Copy or download your score.

`;


/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}


/* =========================
   CREATE STYLE
========================= */

const style = document.createElement("style");

style.textContent = `
#instructionsBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 16px;
  background:#2e8b57;
  color:#fff;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.6);
  z-index:99998;
}

#instructionsBtn:hover{
  background:#257047;
}

#instructionsRoot{
  position:fixed;
  inset:0;
  display:none;
  z-index:99999;
}

#instructionsBackdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

#instructionsModal{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  width:min(650px,90vw);
  max-height:90vh;
  background:#fff;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#instructionsHeader{
  padding:12px 16px;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  gap:10px;
}

#instructionsTitle{
  color:#1976d2;
  font-weight:600;
  font-size:1.1em;
}

#instructionsBack{
  border:none;
  background:none;
  font-size:20px;
  cursor:pointer;
  color:#1976d2;
  font-weight:600;
}

#instructionsContent{
  padding:2px 18px 18px 18px;
  overflow-y:auto;
  line-height:1.6;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

#instructionsContent::-webkit-scrollbar{
  display:none;
}

#instructionsContent h3{
  color:#1976d2;
  margin:12px 0 4px 0;
  font-weight:600;
}

#instructionsContent p{
  margin:4px 0;
}

#instructionsContent hr{
  margin:12px 0;
}
`;

document.head.appendChild(style);


/* =========================
   CREATE BUTTON
========================= */

const btn = document.createElement("button");
btn.id = "instructionsBtn";
btn.textContent = "Instructions";

document.body.appendChild(btn);


/* =========================
   CREATE MODAL
========================= */

const root = document.createElement("div");
root.id = "instructionsRoot";

root.innerHTML = `
<div id="instructionsBackdrop"></div>

<div id="instructionsModal">

  <div id="instructionsHeader">
    <button id="instructionsBack">←</button>
    <span id="instructionsTitle">Instructions</span>
  </div>

  <div id="instructionsContent">
    ${parseRawInstructions(RAW_TEXT)}
  </div>

</div>
`;

document.body.appendChild(root);


/* =========================
   SCROLL LOCK
========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{
  e.stopPropagation();
},{passive:false});

modalContent.addEventListener("touchmove", e=>{
  e.stopPropagation();
},{passive:false});


/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";
  document.documentElement.style.overflow="hidden";
}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";
  document.documentElement.style.overflow="";
}

btn.onclick = openModal;

document.getElementById("instructionsBack").onclick = closeModal;
document.getElementById("instructionsBackdrop").onclick = closeModal;

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* =========================
   DYNAMIC BODY PADDING FOR BUTTON
========================= */

function adjustBodyPadding(){
  const btnHeight = btn.offsetHeight + -25; // include some gap
  document.body.style.paddingBottom = `${btnHeight}px`;
}

// Initial adjustment
adjustBodyPadding();

// Update if window is resized (responsive)
window.addEventListener("resize", adjustBodyPadding);

})();
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
