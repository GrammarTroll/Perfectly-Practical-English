<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound Board</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Outer panel (matches 500px flyout) */
    .content-container {
      width: 120px;
      height: 500px;
      background-color: #000;
      border: 1px solid #000;
      border-radius: 8px;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 0;
    }

    /* Button stack area: +10px extra margin top/bottom */
    .button-container {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 30px 10px; /* 10px extra top/bottom margin beyond previous 20px */
      box-sizing: border-box;
    }

    /* Buttons: 20px wider (fills more width), taller to close gaps */
    .sound-button {
      background-color: #1976d2;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 9px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      width: calc(100% + 20px); /* 20px wider than container */
      height: 38px;              /* taller for smaller gaps (~3mm ≈ 11px) */
    }

    .sound-button:hover {
      background-color: #cc0000;
    }
  </style>
</head>
<body>

  <div class="content-container">
    <div class="button-container">
      <button onclick="playSound('do')" class="sound-button">Do (C4)</button>
      <button onclick="playSound('re')" class="sound-button">Re (D4)</button>
      <button onclick="playSound('mi')" class="sound-button">Mi (E4)</button>
      <button onclick="playSound('fa')" class="sound-button">Fa (F4)</button>
      <button onclick="playSound('sol')" class="sound-button">Sol (G4)</button>
      <button onclick="playSound('la')" class="sound-button">La (A4)</button>
      <button onclick="playSound('ti')" class="sound-button">Ti (B4)</button>
      <button onclick="playSound('high-do')" class="sound-button">Do (C5)</button>
    </div>
  </div>

  <script>
    function playSound(note) {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const duration = 1;
      const freqs = {
        "do": 261.63,
        "re": 293.66,
        "mi": 329.63,
        "fa": 349.23,
        "sol": 392.00,
        "la": 440.00,
        "ti": 493.88,
        "high-do": 523.25
      };

      const oscillator = audioContext.createOscillator();
      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(freqs[note], audioContext.currentTime);

      const gainNode = audioContext.createGain();
      gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      oscillator.start();
      oscillator.stop(audioContext.currentTime + duration);
    }

    // Green border
    const borderDiv = document.createElement("div");
    borderDiv.style.position = "fixed";
    borderDiv.style.inset = "0";
    borderDiv.style.border = "10px solid #39FF14";
    borderDiv.style.boxSizing = "border-box";
    borderDiv.style.zIndex = "9999";
    borderDiv.style.pointerEvents = "none";
    document.body.appendChild(borderDiv);
  </script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
</html>
