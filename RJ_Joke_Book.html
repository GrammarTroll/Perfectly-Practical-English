<style>
/* ------------------------------------------
   GLOBAL
-------------------------------------------*/

body {
    font-family: Raleway, Arial, sans-serif;
    background: #FAF3DD;
    margin: 0;
}

#app {
    width: 100%;
    max-width: 350px;
    padding: 10px;
    margin: 0 auto;
    box-sizing: border-box;
}

input, button {
    font-size: 15px;
}

/* inputs */
input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #bbb;
    box-sizing: border-box;
}

/* buttons */
button {
    padding: 10px 14px;
    border-radius: 8px;
    border: none;
    background: #4b7cff;
    color: white;
    cursor: pointer;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
}

button:active {
    transform: translateY(1px);
}

/* COVER */
#cover {
    background: white;
    padding: 14px;
    border-radius: 12px;
}

#cover .row {
    display: flex;
    gap: 6px;
    align-items: center;
}

#cover .row input {
    flex: 1;
}

#cover .row button {
    flex: 0;
}

/* SLIDES */
#slide { display: none; }

.question {
    background: white;
    padding: 14px;
    border-radius: 12px;
}

#qline {
    font-size: 18px;
    margin-bottom: 12px;
}

.tile {
    width: 275px;
    padding: 12px;
    margin: 6px 0;
    font-size: 16px;
    border-radius: 10px;
    background: #CFE3FF;
    border: 2px solid #7AA7D9;
    cursor: pointer;
    text-align: left;
}

.tile.correct {
    background: #9ADF9A;
    border-color: #2E7D32;
}

.tile.wrong {
    background: #F2A0A0;
    border-color: #B71C1C;
}

.tile .emoji {
    margin-left: 6px;
}

/* countdown + timer */
#timer,
#countdown {
    font-size: 15px;
    margin-top: 6px;
}

/* RESULTS */
#scoreboard { display: none; }

#scoreOut {
    background: white;
    padding: 10px;
    font-family: monospace;
    border-radius: 6px;
}

/* fade */
#fadeOverlay {
    position: fixed;
    inset: 0;
    background: #FAF3DD;
    opacity: 0;
    pointer-events: none;
    transition: opacity .55s;
}

#cover,
.question,
#scoreboard {
    margin-top: 15px;
}

/* ===============================
   FORM ROW (shared layout)
   =============================== */

.formRow {
  display: flex;
  flex-direction: row;
  flex-wrap: nowrap;
  gap: 6px;

  width: 100%;
  height: 38px;              /* single shared height */
  margin-bottom: 10px;

  align-items: stretch;     /* children fill the row */
}

/* All direct children share the same box */
.formRow > * {
  height: 100%;
  display: flex;
  align-items: center;
  box-sizing: border-box;
}

/* Buttons in the row */
.formRow > button {
  flex: 0 0 38px;
  padding: 0;
  margin: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 14px;
  line-height: 1;
}

/* Selector field behaves like an input */
.formRow > #sectionWheelContainer {
  flex: 1 1 auto;
  min-width: 0;

  padding: 0 10px;
  background: #fff;
  border: 1px solid #999;
  border-radius: 6px;

  display: flex;
  align-items: center;
  overflow: hidden;
}

#sectionWheelContainer .wheel {
  flex: 1;
  font-size: 12px;
  line-height: 1;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;

  user-select: none;
  pointer-events: none;
}

/* ===============================
   WORD BASELINE (NO JUMPING)
   =============================== */

.word {

  padding: 0 2px;                      /* reserve space */
  border-radius: 4px;
  box-shadow: 0 0 0 2px transparent;   /* reserve halo space */
  transition:
    background-color 0.15s ease,
    box-shadow 0.15s ease;
}

/* ===============================
   SELECTED STATE (BLUE + HALO)
   =============================== */

.word.selected-word {
  background-color: rgba(25, 118, 210, 0.25); /* faded blue */
  box-shadow: 0 0 0 2px rgba(25, 118, 210, 0.35);
}

/* Keep exact same look after submit */
.word.selected-word.correct,
.word.selected-word.incorrect {
  background-color: rgba(25, 118, 210, 0.25);
  box-shadow: 0 0 0 2px rgba(25, 118, 210, 0.35);
}

.word.correct {

// ------------------------------------------------
// PARSER
// ------------------------------------------------

function parseSections(raw) {
  const lines = raw.split("\n").map(l => l.trim());
  const sections = [];

  let i = 0;

  while (i < lines.length) {
    let line = lines[i];

    // ---------- SECTION HEADER ----------
    if (line.startsWith("~")) {
      let title = "";

      // Case 1: ~Title~
      if (line.endsWith("~") && line.length > 2) {
        title = line.replace(/~/g, "").trim();
        i++;
      }
      // Case 2: ~Title  ...  Subtitle~
      else {
        title = line.replace(/^~/, "").trim();
        i++;

        while (i < lines.length && !lines[i].endsWith("~")) {
          if (lines[i]) title += " — " + lines[i];
          i++;
        }

        if (lines[i]?.endsWith("~")) {
          title += " — " + lines[i].replace(/~$/, "").trim();
          i++;
        }
      }

      const questions = [];

      // ---------- QUESTIONS ----------
      while (i < lines.length && !lines[i].startsWith("~")) {
        if (!lines[i]) {
          i++;
          continue;
        }

        if (lines[i] === "BLANK" && lines[i + 1] === "?BLANK") {
          i += 2;
          continue;
        }

        const question = lines[i];
        i++;

        const opts = [];
        let answer = "";

        while (i < lines.length && lines[i]) {
          const opt = lines[i];

          if (opt.includes("|")) {
            const clean = opt.replace(/\|/g, "").trim();
            opts.push(clean);
            answer = clean;
          } else {
            opts.push(opt.trim());
          }

          i++;
        }

        questions.push({ question, opts, answer });
        i++;
      }

      sections.push({ title, questions });
      continue;
    }

    i++;
  }

  return sections;
}


const sections = parseSections(mcRaw);

let sectionIndex = -1; // placeholder state
let activeSection = null;


const wheel = document.querySelector(".wheel");
const upBtn = document.getElementById("sectionUp");
const downBtn = document.getElementById("sectionDown");
const startBtn = document.getElementById("sectionStart");

function renderWheel() {
  if (sectionIndex === -1) {
    wheel.textContent = "Select a Joke Book.";
    startBtn.disabled = true;
  } else {
    wheel.textContent = sections[sectionIndex].title;
    startBtn.disabled = false;
  }
}
upBtn.onclick = () => {
  if (sectionIndex === -1) sectionIndex = sections.length - 1;
  else sectionIndex = (sectionIndex - 1 + sections.length) % sections.length;
  renderWheel();
};

downBtn.onclick = () => {
  if (sectionIndex === -1) sectionIndex = 0;
  else sectionIndex = (sectionIndex + 1) % sections.length;
  renderWheel();
};

renderWheel();
startBtn.onclick = start;


// ------------------------------------------------
// STATE
// ------------------------------------------------

let questions = [];

let idx = 0;
let score = 0;
let locked = false;

let timer = 15;
let timerID = null;

let ref = 15;
let refID = null;

let fading = false;

let playerName = "";
let playerId = "";

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

// ------------------------------------------------
// START (FIXED)
// ------------------------------------------------

function start() {
  const nm = document.getElementById("name").value.trim();
  const ii = document.getElementById("id").value.trim();

  if (!nm || !ii) {
    alert("Enter name and ID.");
    return;
  }

  activeSection = sections[sectionIndex];

  if (!activeSection.questions.length) {
    alert("This section has no questions.");
    return;
  }

  playerName = nm;
  playerId = ii;

  idx = 0;
  score = 0;
  questions.length = 0;
  questions.push(...activeSection.questions);

  cover.style.display = "none";
  slide.style.display = "block";

  load();
}

// ------------------------------------------------
// RENDER
// ------------------------------------------------

function load() {
    const q = questions[idx];
    locked = false;

    qline.textContent = (idx + 1) + ". " + q.question;

    options.innerHTML = "";

    q.opts.forEach((opt, i) => {
        options.innerHTML += `
            <div class="tile" onclick="clickTile(${i})">
                ${letters[i]}) ${opt}
            </div>
        `;
    });

    runTimer();
    runRef();
}

// ------------------------------------------------
// CLICK
// ------------------------------------------------

function clickTile(i) {
    const q = questions[idx];
    const tiles = document.querySelectorAll(".tile");

    const chosen = q.opts[i];

    if (!locked) {
        locked = true;
        if (chosen === q.answer) score++;
    }

    tiles.forEach(t => {
        t.classList.remove("correct","wrong");
        t.querySelectorAll(".emoji").forEach(x => x.remove());
    });

    const t = tiles[i];
    t.classList.add(chosen === q.answer ? "correct" : "wrong");

    const e = document.createElement("span");
    e.className = "emoji";
    e.textContent = chosen === q.answer ? "😊" : "😢";
    t.appendChild(e);
}

// ------------------------------------------------
// TIMERS
// ------------------------------------------------

function runTimer() {
    timer = 15;
    timer.textContent = timer;

    clearInterval(timerID);

    timerID = setInterval(() => {
        timer--;
        timer.textContent = timer;

        if (timer <= 0) nextSlide();
    }, 1000);
}

function runRef() {
    ref = 15;
    countdown.textContent = "Reference: " + ref;

    clearInterval(refID);

    refID = setInterval(() => {
        ref--;
        countdown.textContent = "Reference: " + ref;

        if (ref <= 0) clearInterval(refID);
    }, 1000);
}

// ------------------------------------------------
// SLIDE FLOW
// ------------------------------------------------

function nextSlide() {
    if (fading) return;

    if (idx >= questions.length - 1) {
        finish();
        return;
    }

    fading = true;

    fadeOverlay.style.opacity = "1";

    setTimeout(() => {
        idx++;
        load();
    }, 550);

    setTimeout(() => {
        fadeOverlay.style.opacity = "0";
        fading = false;
    }, 600);
}

// ------------------------------------------------
// FINISH
// ------------------------------------------------

function finish() {
    fadeOverlay.style.opacity = "0";

    slide.style.display = "none";
    scoreboard.style.display = "block";

    const date = new Date().toISOString();
    const file = location.pathname.split("/").pop();

    const percent = ((score / questions.length) * 100).toFixed(1);

    scoreOut.textContent =
        `${file}|${playerName}|${playerId}|${date}|` +`${score}/${questions.length}|${percent}%`;

saveResult(scoreOut.textContent);

}

// ------------------------------------------------
// DOWNLOADS
// ------------------------------------------------

function copyScore() {
    navigator.clipboard.writeText(scoreOut.textContent);
}

// RANDOMIZE OPTIONS FOR EACH QUESTION
// ---------------------------------------------------------

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function randomizeQuestions(qs) {
    qs.forEach(q => {
        // remember the correct answer
        const correct = q.answer;

        // shuffle options
        shuffle(q.opts);

        // re-assign answer based on shuffled list
        q.answer = correct;
    });
}

// Run it
randomizeQuestions(questions);

<script>
// ---------------------------------------------------------
// STANDALONE AUDIO FEEDBACK SCRIPT
// ---------------------------------------------------------

document.addEventListener("DOMContentLoaded", () => {

    // 1️⃣ Create AudioContext
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    // 2️⃣ Play correct / happy tone
    function playCorrect() {
        audioCtx.resume().then(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = "sine";
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        });
    }

    // 3️⃣ Play wrong / sad tone
    function playWrong() {
        audioCtx.resume().then(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = "triangle";
            osc.frequency.setValueAtTime(450, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        });
    }

    // 4️⃣ Hook into MC tiles
    window.addEventListener('click', e => {
        if (!e.target.classList.contains('tile')) return;

        const tile = e.target;
        const isCorrect = tile.classList.contains('correct');

        if (isCorrect) playCorrect();
        else playWrong();
    });

    // 5️⃣ Optional: hook text inputs / textarea
    function normalizeString(str){ 
        return str.trim().toLowerCase().replace(/\s+/g,' '); 
    }

    function handleTextInput(input){
        const container = input.closest('.exercise') || document.body;
        const correctNode = container.querySelector('.correct-answer');
        if(!correctNode) return;

        const correctText = correctNode.textContent;
        const userText = input.value;
        const isCorrect = normalizeString(userText) === normalizeString(correctText);

        if(isCorrect) playCorrect();
        else playWrong();
    }

    document.body.addEventListener('blur', e=>{
        if(e.target.matches('input[type="text"], textarea')) handleTextInput(e.target);
    }, true);

    console.log("✅ Standalone emoji + audio feedback system loaded");
});
</script>


<script>

========================= */

const RAW_TEXT = `
Open Section Content 
1. Click blue buttons to open sections.

---

1. Highlight - Select text and click to highlight.
2. Click again to remove highlight.
3. Copy - Select text and click to copy.

/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}

(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
