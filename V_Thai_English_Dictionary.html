<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dictionary</title>
<style>
:root{
  --tile-height:70px;
  --tile-font:20px;
  --tile-radius:14px;
  --tile-padding:18px 22px;
  --bg:#f0f0f0;
  --tile-shadow:0 4px 8px rgba(0,0,0,0.3);
  --placeholder:#8f8f8f;
  --text:#222222;
  --pastel-red:#ffe5e5;
  --pastel-blue:#e5f0ff;
  --tile-white:#ffffff;
}

html,body{
  height:100%;
  margin:0;
  background: linear-gradient(to bottom,#d0d0d0,#f0f0f0);
  font-family: system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
  color: var(--text);
}

body{
  display:flex;
  flex-direction:column;
  gap:14px;
  padding:18px;
}

.tile{
  width:100%;
  height: var(--tile-height);       /* force all tiles to same height */
  min-height: var(--tile-height);
  border-radius:var(--tile-radius);
  box-shadow:var(--tile-shadow);
  display:flex;
  align-items:center;
  padding: var(--tile-padding);
  box-sizing:border-box;
  font-size: 20px;
  color:var(--text);
  line-height:1.4;
  position:relative;
}

/* Color classes */
.red { background:var(--pastel-red); }
.blue { background:var(--pastel-blue); }
.white{ background:var(--tile-white); }

/* Input styling */
.tile-input{
  background:transparent;
  border:none;
  outline:none;
  font-size:var(--tile-font);
  width:100%;
  height:100%;
  padding:0;
  margin:0;
  color:var(--text);
  position:relative;
  z-index:2;
}
.tile-input::placeholder{ color: var(--placeholder); }

/* Suggestion text */
.input-suggestion{
  position:absolute;
  top:0;
  left:22px;
  font-size: 20;
  color: rgba(0,0,0,0.3);
  pointer-events:none;
  z-index:1;
  height:100%;
  display:flex;
  align-items:center;
}

.small-text{ font-size:10px; color:var(--placeholder); }

.light-text{ color:var(--placeholder); }

.tile.red.small-text {
  height: 40px;       /* or any smaller value you prefer */
  min-height: 40px;
  font-size: 10px;    /* smaller text to fit */
  padding: 10px 22px; /* reduce padding too */
}


.status-tile {
  height: 20px;
  min-height: 10px;
  margin-top: -10px;   /* move it upward a bit */
  box-shadow: none;
  background: transparent;
  color: var(--placeholder);
  text-align: right;
  padding-right: 22px;
}

</style>
</head>
<body>

<!-- Top Tile -->
<div class="tile red top-tile light-text">
  <div>
    <strong>English - Thai</strong><br>
    <span class="small-text"></span>
  </div>
</div>

<!-- English Tile -->
<div class="tile white">
  <input id="englishInput" class="tile-input" type="text" placeholder="Type in English" autocomplete="off">
  <div id="englishSuggestion" class="input-suggestion"></div>
</div>

<!-- Description Tile -->
<div class="tile blue">
  <input id="descriptionInput" class="tile-input" type="text" placeholder="Description" autocomplete="off">
</div>

<!-- Phonetic Tile -->
<div class="tile blue">
  <input id="phoneticInput" class="tile-input" type="text" placeholder="Phonetic" autocomplete="off">
</div>

<!-- Thai Tile -->
<div class="tile white">
  <input id="thaiInput" class="tile-input" type="text" placeholder="พิมพ์เป็นภาษาไทย - phim pen phaasǎa Thai" autocomplete="off">
</div>

<!-- Footer Tile -->
<div class="tile red small-text">
  © 2026 Perfectly Practical English™. All rights reserved.
</div>

<!-- Status Tile -->
<div class="tile status-tile small-text light-text" id="statusTile">
  Loading dictionary…
</div>

function normalize(s){ return (s||'').toString().replace(/[\u200B\u200C\u200D\uFEFF]/g,'').replace(/\s+/g,' ').trim(); }

const dictionary = dictionaryRaw.split(/\r?\n/).map(l=>l.trim()).filter(l=>l).map(l=>{
  const p=l.split('|');
  return { english:p[0]||'', description:p[1]||'', phonetic:p[2]||'', thai:p[3]||'' };
});

// ---------------- DOM Refs ----------------
const englishInput = document.getElementById('englishInput');
const descriptionInput = document.getElementById('descriptionInput');
const phoneticInput = document.getElementById('phoneticInput');
const thaiInput = document.getElementById('thaiInput');
const statusTile = document.getElementById('statusTile');
const englishSuggestion = document.getElementById('englishSuggestion');

statusTile.textContent = `Loaded ${dictionary.length} entries.`;

// ---------------- Helpers right here  ----------------


// ---------------- Helpers ----------------
function findExactEnglish(val){
    if(!val) return null;
    const q = normalize(val).toLowerCase();
    return dictionary.find(d => normalize(d.english).toLowerCase() === q) || null;
}

function findExactThai(val){
    if(!val) return null;
    const q = normalize(val);
    return dictionary.find(d => normalize(d.thai) === q) || null;
}

function getEnglishSuggestion(val){
    if(!val) return '';
    const q = normalize(val).toLowerCase();
    const match = dictionary.find(d => normalize(d.english).toLowerCase().startsWith(q));
    return match ? match.english : '';
}

function getThaiSuggestion(val){
    if(!val) return '';
    const q = normalize(val);
    const match = dictionary.find(d => normalize(d.thai).startsWith(q));
    return match ? match.thai : '';
}

// ---------------- Update functions ----------------
function updateFromEnglish(val){
    const entry = findExactEnglish(val);
    if(entry){
        descriptionInput.value = entry.description;
        phoneticInput.value = entry.phonetic;
        thaiInput.value = entry.thai;
        statusTile.textContent = `Found: ${entry.english} | ${entry.description} | ${entry.phonetic} | ${entry.thai}`;
    } else {
        descriptionInput.value = '';
        phoneticInput.value = '';
        thaiInput.value = '';
        statusTile.textContent = `No entry for "${val}". Loaded ${dictionary.length} entries.`;
    }
}

function updateFromThai(val){
    const entry = findExactThai(val);
    if(entry){
        englishInput.value = entry.english;
        descriptionInput.value = entry.description;
        phoneticInput.value = entry.phonetic;
        statusTile.textContent = `Found: ${entry.english} | ${entry.description} | ${entry.phonetic} | ${entry.thai}`;
    } else {
        englishInput.value = '';
        descriptionInput.value = '';
        phoneticInput.value = '';
        statusTile.textContent = `No entry for "${val}". Loaded ${dictionary.length} entries.`;
    }
}

// ---------------- Event Listeners ----------------

// English Input
englishInput.addEventListener('input', e => {
    let val = e.target.value;

    const match = dictionary.find(d => normalize(d.english).toLowerCase().startsWith(normalize(val).toLowerCase()));
    if(match){
        val = match.english[0] === match.english[0].toUpperCase() 
            ? val.charAt(0).toUpperCase() + val.slice(1).toLowerCase()
            : val.toLowerCase();
    } else {
        val = val.toLowerCase();
    }

    const pos = e.target.selectionStart;
    e.target.value = val;
    e.target.setSelectionRange(pos, pos);

    updateFromEnglish(val);

    const suggestion = getEnglishSuggestion(val);
    englishSuggestion.textContent = (suggestion && suggestion.toLowerCase() !== val.toLowerCase()) ? suggestion : '';
});

englishInput.addEventListener('keydown', e => {
    if((e.key==='Tab'||e.key==='ArrowRight') && englishSuggestion.textContent){
        e.preventDefault();
        englishInput.value = englishSuggestion.textContent;
        englishSuggestion.textContent = '';
        updateFromEnglish(englishInput.value);
    }
});

// Thai Input
thaiInput.addEventListener('input', e => {
    const val = e.target.value;
    updateFromThai(val);

    // Optional: show Thai autocomplete suggestion if you add a <span id="thaiSuggestion"></span>

});

</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>

(function(){

/* =========================
   RAW INSTRUCTIONS TEXT
========================= */

const RAW_TEXT = `

How to use this page...

1. Type an English word and the description, Phonetic spelling and Thai word will appear.
Feature in progress: Type a Thai word and the description, Phonetic spelling and English word will appear.

`;


/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}


/* =========================
   CREATE STYLE
========================= */

const style = document.createElement("style");

style.textContent = `
#instructionsBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 16px;
  background:#2e8b57;
  color:#fff;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.6);
  z-index:99998;
}

#instructionsBtn:hover{
  background:#257047;
}

#instructionsRoot{
  position:fixed;
  inset:0;
  display:none;
  z-index:99999;
}

#instructionsBackdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

#instructionsModal{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  width:min(650px,90vw);
  max-height:90vh;
  background:#fff;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#instructionsHeader{
  padding:12px 16px;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  gap:10px;
}

#instructionsTitle{
  color:#1976d2;
  font-weight:600;
  font-size:1.1em;
}

#instructionsBack{
  border:none;
  background:none;
  font-size:20px;
  cursor:pointer;
  color:#1976d2;
  font-weight:600;
}

#instructionsContent{
  padding:2px 18px 18px 18px;
  overflow-y:auto;
  line-height:1.6;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

#instructionsContent::-webkit-scrollbar{
  display:none;
}

#instructionsContent h3{
  color:#1976d2;
  margin:12px 0 4px 0;
  font-weight:600;
}

#instructionsContent p{
  margin:4px 0;
}

#instructionsContent hr{
  margin:12px 0;
}
`;

document.head.appendChild(style);


/* =========================
   CREATE BUTTON
========================= */

const btn = document.createElement("button");
btn.id = "instructionsBtn";
btn.textContent = "Instructions";

document.body.appendChild(btn);


/* =========================
   CREATE MODAL
========================= */

const root = document.createElement("div");
root.id = "instructionsRoot";

root.innerHTML = `
<div id="instructionsBackdrop"></div>

<div id="instructionsModal">

  <div id="instructionsHeader">
    <button id="instructionsBack">←</button>
    <span id="instructionsTitle">Instructions</span>
  </div>

  <div id="instructionsContent">
    ${parseRawInstructions(RAW_TEXT)}
  </div>

</div>
`;

document.body.appendChild(root);


/* =========================
   SCROLL LOCK
========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{
  e.stopPropagation();
},{passive:false});

modalContent.addEventListener("touchmove", e=>{
  e.stopPropagation();
},{passive:false});


/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";
  document.documentElement.style.overflow="hidden";
}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";
  document.documentElement.style.overflow="";
}

btn.onclick = openModal;

document.getElementById("instructionsBack").onclick = closeModal;
document.getElementById("instructionsBackdrop").onclick = closeModal;

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* =========================
   DYNAMIC BODY PADDING FOR BUTTON
========================= */

function adjustBodyPadding(){
  const btnHeight = btn.offsetHeight + -25; // include some gap
  document.body.style.paddingBottom = `${btnHeight}px`;
}

// Initial adjustment
adjustBodyPadding();

// Update if window is resized (responsive)
window.addEventListener("resize", adjustBodyPadding);

})();
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
