<style>
/* ===== GLOBAL RESET ===== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #a0e0ff 0%, #ffffff 95%);
  user-select: none;
  padding: 30px; /* breathing room for bubble effect */
}

/* ===== OVERLAY ===== */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background-color: #d0e7f9;
  z-index: 9998;
}

/* ===== TOP + MID BARS ===== */
#topBar, #midBar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px;
  margin: 0 auto 16px auto;      /* center the bars */
  background: #f0f8ff;
  border-radius: 6px;
  width: 100%;
  max-width: 600px;
  flex-wrap: nowrap;
  box-sizing: border-box;
}

#topBar input[type="text"] {
  flex: 1 1 0;                    /* inputs shrink first */
  min-width: 70px;
  max-width: 140px;
  padding: 6px 10px;
  font-size: 16px;
  border: 1px solid #999;
  border-radius: 4px;
}

#topBar button, #midBar button {
  flex: 0 0 auto;
  white-space: nowrap;
}

#countdownOverlay {
  flex: 0 0 auto;
  min-width: 32px;
  text-align: center;
}

/* ===== WHEEL SELECT ===== */
#sectionWheelContainer {
  height: 34px;
  flex: 1 1 0;
  min-width: 0;
  overflow: hidden;
  border: 1px solid #999;
  border-radius: 4px;
  background: #fff;
  position: relative;
}

#wheel, .wheel {
  position: absolute;
  top: 0;
  width: 100%;
  transition: transform 0.25s ease;
}

.wheelItem {
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 15px;
  line-height: 1;
  user-select: none;
}

.wheelItem.placeholder {
  color: #888;
  font-style: bold;
}

/* ===== BUTTONS ===== */
button {
  padding: 6px 12px;
  font-size: 16px;
  border-radius: 4px;
  border: 1px solid #777;
  background: #eef6fb;
  cursor: pointer;
  user-select: none;
}

button:disabled {
  opacity: 0.5;
  cursor: default;
}

/* ===== SCOREBOARD ===== */
#scoreboardContainer {
  margin: 12px 0 0 0;
  font-family: monospace;
  font-weight: bold;
  font-size: 18px;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
  max-width: 100%;
}

#scoreButtons {
  margin: 12px 0 24px 0;
  display: none;
  gap: 10px;
}

#scoreButtons button {
  font-family: Arial, sans-serif;
}

/* ===== GAME AREA ===== */
#gameArea {
  position: relative;
  margin: 0 auto 16px auto;
  height: 240px;
  width: 100%;
  max-width: 600px;
  padding: 10px;
  border-radius: 6px;
  background: #9fd0ff;
  overflow: hidden;
  box-shadow: inset 0 0 12px #5f9eff;
}

.word {
  position: absolute;
  font-size: 24px;
  font-weight: 600;
  white-space: nowrap;
  user-select: none;
  pointer-events: none;
  transition: transform 0.1s linear;
  text-shadow: 0 0 3px rgba(0,0,0,0.3);
}

.letter {
  display: inline-block;
  transition: color 0.2s ease;
}

.typed {
  color: red !important;
}

.exploding {
  animation: explodeAnim 0.4s ease forwards;
}

@keyframes explodeAnim {
  0% { transform: scale(1) rotate(0deg); opacity: 1; }
  100% { transform: scale(3) rotate(720deg); opacity: 0; }
}

/* ===== TYPING INPUT ===== */
#typingInput {
  position: fixed;
  left: 5px;
  top: 5px;
  width: 24px;
  height: 24px;
  opacity: 0;
  pointer-events: none;
  background: transparent;
  border: none;
  z-index: 9999;
  font-size: 18px;
  color: black;
  caret-color: transparent;
}

/* ===== GAME OVER ===== */
.game-over {
  position: fixed;
  top: -50px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 36px;
  font-weight: bold;
  color: red;
  opacity: 0;
  transition: top 1s, opacity 1s;
}

/* ===== FOOTER ===== */
footer {
  margin-top: 16px;
  padding: 10px 12px;
  text-align: left;
  font-size: 14px;
  color: #666;
  background: #f0f8ff;
  border-radius: 6px;
}

/* ===== FORM ROWS ===== */
.formRow {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ===== EXTRA TEMPLATE-SPECIFIC ADDITIONS ===== */

function parseSections(raw) {
  const sections = [];

  // Split on any line that STARTS with ~
  const blocks = raw
    .split(/^\s*~\s*/m)
    .map(b => b.trim())
    .filter(Boolean);

  blocks.forEach(block => {
    const lines = block
      .split(/\r?\n/)
      .map(l => l.replace(/<br\s*\/?>/gi, '').trim())
      .filter(Boolean);

    if (!lines.length) return;

    const sectionName = lines[0];
    const entries = [];

    lines.forEach(line => {
      if (!line.startsWith('вҖў')) return;

      const entry = line
        .replace(/^вҖў\s*/, '')
        .split(/[вҖ“вҖ”-]/)[0]
        .replace(/[^\p{L}\s]/gu, '')
        .trim()
        .toLowerCase()
        .split(/\s+/)[0];

      if (entry) entries.push(entry);
    });

    if (entries.length) {
      sections.push({
        name: sectionName,
        entries
      });
    }
  });

  return sections;
}

        downloadBlob(new Blob([scoreText], { type: 'text/plain' }), filename + '.txt');
      } else {
        await downloadScoreAsPNG(scoreText, filename + '.png');
      }
    }, true);
  }

  // Grab scoreboard and buttons
  const scoreboard = document.getElementById('scoreboardContainer');
  const downloadTxtBtn = document.getElementById('downloadTxtBtn');
  const downloadPngBtn = document.getElementById('downloadPngBtn');
  const nameInput = document.getElementById('nameInput');
  const idInput = document.getElementById('idInput');

  if (scoreboard) {
    const getFilename = () => {
      const htmlFile = window.location.pathname.split('/').pop() || 'index.html';
      const name = nameInput?.value.trim() || 'Student';
      const id = idInput?.value.trim() || 'ID';
      const now = new Date();
      const dateStr = `${String(now.getDate()).padStart(2,'0')}${String(now.getMonth()+1).padStart(2,'0')}${now.getFullYear()}`;
      return `${htmlFile}|${name}|${id}|${dateStr}`;
    };

    hijackDownloadButton(downloadTxtBtn, () => scoreboard.textContent.trim(), getFilename, true);
    hijackDownloadButton(downloadPngBtn, () => scoreboard.textContent.trim(), getFilename, false);
  }

})();
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>

(function(){

/* =========================
   RAW INSTRUCTIONS TEXT
========================= */

const RAW_TEXT = `

How to play...

1. Enter Name and ID.
2. Select a category.
3. Click Start to begin.
4. Type the words correctly.
5. Click Submit to see your score.
6. Copy or download your score.

`;


/* =========================
   RAW TEXT PARSER
========================= */

function parseRawInstructions(text){

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const html = [];

  lines.forEach(line => {

    if(line === "---"){
      html.push(`<hr>`);
      return;
    }

    if(/^\d+\./.test(line)){
      html.push(`<p>${line}</p>`);
      return;
    }

    if(!/[.!?:]$/.test(line)){
      html.push(`<h3>${line}</h3>`);
      return;
    }

    html.push(`<p>${line}</p>`);
  });

  return html.join("");
}


/* =========================
   CREATE STYLE
========================= */

const style = document.createElement("style");

style.textContent = `
#instructionsBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 16px;
  background:#2e8b57;
  color:#fff;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.6);
  z-index:99998;
}

#instructionsBtn:hover{
  background:#257047;
}

#instructionsRoot{
  position:fixed;
  inset:0;
  display:none;
  z-index:99999;
}

#instructionsBackdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

#instructionsModal{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  width:min(650px,90vw);
  max-height:90vh;
  background:#fff;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#instructionsHeader{
  padding:12px 16px;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  gap:10px;
}

#instructionsTitle{
  color:#1976d2;
  font-weight:600;
  font-size:1.1em;
}

#instructionsBack{
  border:none;
  background:none;
  font-size:20px;
  cursor:pointer;
  color:#1976d2;
  font-weight:600;
}

#instructionsContent{
  padding:2px 18px 18px 18px;
  overflow-y:auto;
  line-height:1.6;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

#instructionsContent::-webkit-scrollbar{
  display:none;
}

#instructionsContent h3{
  color:#1976d2;
  margin:12px 0 4px 0;
  font-weight:600;
}

#instructionsContent p{
  margin:4px 0;
}

#instructionsContent hr{
  margin:12px 0;
}
`;

document.head.appendChild(style);


/* =========================
   CREATE BUTTON
========================= */

const btn = document.createElement("button");
btn.id = "instructionsBtn";
btn.textContent = "Instructions";

document.body.appendChild(btn);


/* =========================
   CREATE MODAL
========================= */

const root = document.createElement("div");
root.id = "instructionsRoot";

root.innerHTML = `
<div id="instructionsBackdrop"></div>

<div id="instructionsModal">

  <div id="instructionsHeader">
    <button id="instructionsBack">вҶҗ</button>
    <span id="instructionsTitle">Instructions</span>
  </div>

  <div id="instructionsContent">
    ${parseRawInstructions(RAW_TEXT)}
  </div>

</div>
`;

document.body.appendChild(root);


/* =========================
   SCROLL LOCK
========================= */

const modalContent = document.getElementById("instructionsContent");

modalContent.addEventListener("wheel", e=>{
  e.stopPropagation();
},{passive:false});

modalContent.addEventListener("touchmove", e=>{
  e.stopPropagation();
},{passive:false});


/* =========================
   OPEN / CLOSE
========================= */

function openModal(){
  root.style.display="block";
  document.body.style.overflow="hidden";
  document.documentElement.style.overflow="hidden";
}

function closeModal(){
  root.style.display="none";
  document.body.style.overflow="";
  document.documentElement.style.overflow="";
}

btn.onclick = openModal;

document.getElementById("instructionsBack").onclick = closeModal;
document.getElementById("instructionsBackdrop").onclick = closeModal;

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeModal();
});

/* =========================
   DYNAMIC BODY PADDING FOR BUTTON
========================= */

function adjustBodyPadding(){
  const btnHeight = btn.offsetHeight + -25; // include some gap
  document.body.style.paddingBottom = `${btnHeight}px`;
}

// Initial adjustment
adjustBodyPadding();

// Update if window is resized (responsive)
window.addEventListener("resize", adjustBodyPadding);

})();
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>
