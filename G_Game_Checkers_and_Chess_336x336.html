<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess & Checkers</title>

<style>
body {
    margin: 0;
    background: #d0e7f9;
    display: flex;
    justify-content: center;
    font-family: Arial, sans-serif;
}

.wrapper {
    margin-top: -10px;
}

/* GAME GRID */
.game-container {
    display: grid;
    grid-template-columns: repeat(10, 32px);
    grid-template-rows: repeat(10, 32px);
    width: 320px;
}

/* CELLS */
.cell {
    width: 32px;
    height: 32px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    overflow: visible; /* allow glow to escape */
}

.hunter-green { background:#2E8B57; }
.light-warm-grey { background:#D3D3D3; }
.transparent { background:transparent; }

.hunter-green, .light-warm-grey {
    border:1px solid #1f6d3e;
}

/* PIECES */
.piece {
    cursor: pointer;
    transition: transform .2s ease;
    position: relative;
    z-index: 10; /* lift above board */
}

/* CHECKERS */
.checker {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    box-shadow: 2px 2px 10px 4px rgba(19,69,45,.9);
}

.red { background:red; }
.black { background:black; }

/* ===== GLOW SYSTEM ===== */

/* Chess (visible, wide, opaque glow) */
.chess-piece.flash-gold {
    animation: chessGlow 1.2s ease-in-out;
}

@keyframes chessGlow {
    0% {
        text-shadow:
            0 0 8px rgba(255,215,0,1),
            0 0 18px rgba(255,215,0,0.95);
        filter:
            drop-shadow(0 0 20px rgba(255,215,0,0.95))
            drop-shadow(0 0 45px rgba(255,215,0,0.9))
            drop-shadow(0 0 80px rgba(255,215,0,0.85));
    }
    50% {
        text-shadow:
            0 0 14px rgba(255,215,0,1),
            0 0 28px rgba(255,215,0,0.98);
        filter:
            drop-shadow(0 0 35px rgba(255,215,0,1))
            drop-shadow(0 0 70px rgba(255,215,0,0.95))
            drop-shadow(0 0 120px rgba(255,215,0,0.9));
    }
    100% {
        text-shadow:
            0 0 8px rgba(255,215,0,1),
            0 0 18px rgba(255,215,0,0.95);
        filter:
            drop-shadow(0 0 20px rgba(255,215,0,0.95))
            drop-shadow(0 0 45px rgba(255,215,0,0.9))
            drop-shadow(0 0 80px rgba(255,215,0,0.85));
    }
}

/* Checkers (physical disk glow) */
.checker.flash-gold {
    animation: checkerGlow 1s ease-out;
}

@keyframes checkerGlow {
    0%   { box-shadow:0 0 6px gold; }
    50%  { box-shadow:0 0 25px gold; }
    100% { box-shadow:0 0 6px gold; }
}

/* BUTTONS */
.mode-buttons {
    width: 256px;
    margin: -25px auto 0;
    display: flex;
    gap: 3px;
}

.mode-buttons button {
    flex: 1;
    height: 36px;
    background: #0078D4;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="game-container" id="board"></div>

<div class="mode-buttons" id="modeButtons">
    <button onclick="startCheckers()">Checkers</button>
    <button onclick="startChess()">Chess</button>
</div>

</div>

<div id="pieces" style="display:none;"></div>

<script>
const board = document.getElementById("board");
const pieces = document.getElementById("pieces");
const modeButtons = document.getElementById("modeButtons");
let selectedPiece = null;
let mode = null;

/* BUILD GRID */
for (let r=1;r<=10;r++) {
    for (let c=1;c<=10;c++) {
        const cell = document.createElement("div");
        cell.className = "cell transparent";
        cell.id = `cell-${r}-${c}`;

        if (r>1 && r<10 && c>1 && c<10) {
            cell.className = ((r+c)%2===0)
                ? "cell light-warm-grey"
                : "cell hunter-green";
        }

        cell.onclick = () => {
            if (!selectedPiece) return;

            if (
                mode==="checkers" &&
                !cell.classList.contains("hunter-green") &&
                !cell.classList.contains("transparent")
            ) return;

            cell.appendChild(selectedPiece);
            selectedPiece.style.transform="scale(1)";
            selectedPiece.classList.add("flash-gold");
            selectedPiece=null;
        };

        board.appendChild(cell);
    }
}

/* PIECE SELECT */
document.addEventListener("click",e=>{
    if (!e.target.classList.contains("piece")) return;
    e.stopPropagation();

    if (selectedPiece) {
        selectedPiece.style.transform="scale(1)";
        selectedPiece.classList.remove("flash-gold");
    }

    selectedPiece=e.target;
    selectedPiece.style.transform="scale(1.2)";
    selectedPiece.classList.add("flash-gold");
});

/* CHECKERS */
function startCheckers() {
    mode="checkers";
    modeButtons.style.display="none";
    pieces.innerHTML="";

    const redSpots=["2-3","2-5","2-7","2-9","3-2","3-4","3-6","3-8","4-3","4-5","4-7","4-9"];
    const blackSpots=["7-2","7-4","7-6","7-8","8-3","8-5","8-7","8-9","9-2","9-4","9-6","9-8"];

    redSpots.forEach((p,i)=>{
        const d=document.createElement("div");
        d.className="piece checker red";
        pieces.appendChild(d);
        document.getElementById("cell-"+p).appendChild(d);
    });

    blackSpots.forEach((p,i)=>{
        const d=document.createElement("div");
        d.className="piece checker black";
        pieces.appendChild(d);
        document.getElementById("cell-"+p).appendChild(d);
    });
}

/* CHESS */
function startChess() {
    mode="chess";
    modeButtons.style.display="none";
    pieces.innerHTML="";

    const setup=[
        ["2-2","♜"],["2-3","♞"],["2-4","♝"],["2-5","♛"],["2-6","♚"],["2-7","♝"],["2-8","♞"],["2-9","♜"],
        ["3-2","♟"],["3-3","♟"],["3-4","♟"],["3-5","♟"],["3-6","♟"],["3-7","♟"],["3-8","♟"],["3-9","♟"],
        ["8-2","♙"],["8-3","♙"],["8-4","♙"],["8-5","♙"],["8-6","♙"],["8-7","♙"],["8-8","♙"],["8-9","♙"],
        ["9-2","♖"],["9-3","♘"],["9-4","♗"],["9-5","♕"],["9-6","♔"],["9-7","♗"],["9-8","♘"],["9-9","♖"]
    ];

    setup.forEach(([pos,symbol])=>{
        const d=document.createElement("div");
        d.className="piece chess-piece";
        d.innerText=symbol;
        pieces.appendChild(d);
        document.getElementById("cell-"+pos).appendChild(d);
    });
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
</html>
