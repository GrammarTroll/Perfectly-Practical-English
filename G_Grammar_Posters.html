
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Captions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #b3d9ff;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
  max-width: 400px;
  max-height: 100vh;        
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px;
  scroll-behavior: smooth;

  /* 👇 ADD THESE */
  scrollbar-width: none;        /* Firefox */
  -ms-overflow-style: none;     /* IE / old Edge */
}

/* 👇 ADD THIS */
.container::-webkit-scrollbar {
  display: none;                /* Chrome / Safari */
}


#topFields {
  width: 100%;
  display: flex;
  gap: 6px;
}


.mainContainer {
  display: flex;
  flex-direction: column;
  align-items: stretch; /* ok */
}


#responsesWrapper {
  flex: 1;
  overflow-y: auto;
}
#responses {
  width: 100%;
  display: flex;
  flex-direction: column;   /* ✅ REQUIRED */
  gap: 6px;
}
#topFields input {
  flex: 1;                 /* share row evenly */
  min-width: 0;            /* prevent overflow */
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

canvas {
  width: 100%;
  height: auto;
  max-height: 50vh;         /* Take at most half the screen height */
  border-radius: 10px;
  background: #000;
  display: block;
}
    #overlayNumber {
      position: absolute;
      right: 10px;
      bottom: 10px;
      color: #222;
      font-size: 18px;
      font-weight: bold;
      pointer-events: none;
    }
.responseField {
  flex: none;               /* 🔥 allow height growth */
  width: 100%;

  padding: 8px;
  border-radius: 4px;
  border: 1px solid #ccc;

  display: none;
  resize: none;
  overflow: hidden;

  min-height: 20px;
  line-height: 1.4;
  font-family: inherit;
  font-size: 14px;
}

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      width: 100%;
    }
button {
  flex: 1;
  padding: 10px;
  background: #000;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  height: 30px; /* ✅ consistent height across all buttons */
  display: flex;
  align-items: center;
  justify-content: center;
}    button:disabled {
      background: #888;
      cursor: not-allowed;
    }
    button:hover:enabled {
      background: #444;
    }
    #scoreboard {
      margin-top: 0px;
      padding: 10px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 100%;
      display: none;
      text-align: left;
    }
#scoreboard pre {
  min-height: 100px;
  max-height: 50vh;          /* prevents infinite growth */
  white-space: pre-wrap;
  word-wrap: break-word;
  font-size: 14px;

  overflow-y: auto;
  overflow-x: hidden;

  scrollbar-width: none;     /* Firefox */
  -ms-overflow-style: none;  /* IE / old Edge */
}

#scoreboard pre::-webkit-scrollbar {
  display: none;             /* Chrome / Safari */
}
    #scoreboard .controls {
      margin-top: 12px;
    }
    footer {
      margin-top: 0px;
      font-size: 12px;
      color: #777;
    }
    #copyMessage {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 10000;
    }
    .countdownOverlay {
      position: relative;
      display: block;
      margin-top: 6px;
      font-size: 14px;
      font-weight: normal;
      color: #666;
      text-align: right;
      background: transparent;
      padding: 0;
      z-index: 999;
    }

/* ===============================
   FORM ROW (shared layout)
   =============================== */

.formRow {
  display: flex;
  flex-shrink: 0;

  flex-direction: row;
  flex-wrap: nowrap;
  gap: 6px;

  width: 100%;
  height: 38px;              /* single shared height */
  margin-bottom: 10px;

  align-items: stretch;     /* children fill the row */
}

/* All direct children share the same box */
.formRow > * {
  height: 100%;
  display: flex;
  align-items: center;
  box-sizing: border-box;
}

/* Buttons in the row */
.formRow > button {
  flex: 0 0 38px;
  padding: 0;
  margin: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 14px;
  line-height: 1;
}

#sectionStart {
  flex: 1;          /* allow Start to grow */
  padding: 0 12px;  /* give text breathing room */
}

/* Selector field behaves like an input */
.formRow > #sectionWheelContainer {
  flex: 1 1 auto;
  min-width: 0;

  padding: 0 10px;
  background: #fff;
  border: 1px solid #999;
  border-radius: 6px;

  display: flex;
  align-items: center;
  overflow: hidden;
}

/* SECTION WHEEL TEXT */
#sectionWheelContainer .wheel {
  flex: 1;
  font-size: 12px;
  line-height: 1;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;

  user-select: none;
  pointer-events: none;
}

/* ===============================
   WORD BASELINE (NO JUMPING)
   =============================== */

.word {
  display: inline-block;               /* stabilizes inline sizing */
  padding: 0 2px;                      /* reserve space */
  border-radius: 4px;
  box-shadow: 0 0 0 2px transparent;   /* reserve halo space */
  transition:
    background-color 0.15s ease,
    box-shadow 0.15s ease;
}

/* ===============================
   SELECTED STATE (BLUE + HALO)
   =============================== */

.word.selected-word {
  background-color: rgba(25, 118, 210, 0.25); /* faded blue */
  box-shadow: 0 0 0 2px rgba(25, 118, 210, 0.35);
}

/* Keep exact same look after submit */
.word.selected-word.correct,
.word.selected-word.incorrect {
  background-color: rgba(25, 118, 210, 0.25);
  box-shadow: 0 0 0 2px rgba(25, 118, 210, 0.35);
}

/* Optional correctness feedback without layout shift */
.word.correct {
  outline: 1px solid rgba(46, 125, 50, 0.6);
}

.word.incorrect {
  outline: 1px solid rgba(198, 40, 40, 0.6);
}


#sectionSelector {
  height: 64px;          /* or whatever looks right */
  min-height: 64px;
  flex-shrink: 0;        /* CRITICAL */
}

#morphCanvas {
  margin-top: -10px;
}


#copyrightSection {
  width: 100%;
  align-self: stretch;     /* 🔥 override .container centering */
  text-align: left;
  padding: 6px 10px;
  font-size: 8px;
  line-height: 1.1;
  font-weight: normal;
  opacity: 0.7;
}

footer {
  width: 100%;
  align-self: stretch;     /* 🔥 critical fix */
  font-size: 8px;
  line-height: 1.1;
  opacity: 0.7;
  text-align: left;
}

footer p {
  margin: 0;
  padding: 0;
}


  </style>
</head>
<body>
  <div class="container">
    <div id="topFields">
      <input type="text" id="nameField" placeholder="Name" />
      <input type="text" id="idField" placeholder="ID" />
      <button id="submitButton" disabled>Submit</button>

    </div>

  <!-- SECTION SELECTOR -->
  <div class="formRow">
    <button type="button" id="sectionUp">▲</button>

    <div id="sectionWheelContainer">
      <div class="wheel"></div>
    </div>

    <button type="button" id="sectionDown">▼</button>

    <button
      type="button"
      id="sectionStart"
      disabled
    >Start</button>
  </div>


    <div style="position:relative; width:100%;">
      <canvas id="morphCanvas" width="400" height="400"></canvas>
      <!-- <div id="overlayNumber">1</div> -->
    </div>



    <div id="responses"></div>

    <div class="controls">
      <button id="backButton" disabled>Back</button>
      <button id="pauseButton" disabled>Pause</button>
      <button id="nextButton" disabled>Next</button>
    </div>

    <div id="scoreboard">
      <pre id="scoreData" contenteditable="true"></pre>
      <div class="controls">
        <button id="copyButton">Copy</button>
        <button id="downloadTxtButton">↓TXT</button>
        <button id="downloadPngButton">↓PNG</button>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Perfectly Practical English™. All rights reserved.</p>
    </footer>
  </div>

  

  <script>
    let showOverlayNumber = false;

    const rawImageList = `

~Grammar Posters

Slide1.JPG
Slide10.JPG
Slide11.JPG
Slide12.JPG
Slide13.JPG
Slide14.JPG
Slide15.JPG
Slide16.JPG
Slide17.JPG
Slide18.JPG
Slide19.JPG
Slide2.JPG
Slide20.JPG
Slide21.JPG
Slide22.JPG
Slide23.JPG
Slide24.JPG
Slide25.JPG
Slide26.JPG
Slide27.JPG
Slide28.JPG
Slide29.JPG
Slide3.JPG
Slide30.JPG
Slide31.JPG
Slide32.JPG
Slide33.JPG
Slide34.JPG
Slide4.JPG
Slide5.JPG
Slide6.JPG
Slide7.JPG
Slide8.JPG
Slide9.JPG~

`;

    function parseImageSections(raw) {
  const lines = raw.split('\n').map(l => l.trim());
  const sections = [];
  let current = null;

  lines.forEach(line => {
    if (!line) return;

    if (line.startsWith("~")) {
      current = {
        title: line.replace(/~/g, "").trim(),
        images: []
      };
      sections.push(current);
    } else if (current) {
      current.images.push(line);
    }
  });

  return sections;
}

const imageSections = parseImageSections(rawImageList);

const startBtn = document.getElementById('sectionStart');
const wheelEl = document.querySelector('#sectionWheelContainer .wheel');

let sectionIndex = 0;
let activeSection = null;
let images = [];



function updateSectionWheel() {
  const section = imageSections[sectionIndex];
  wheelEl.textContent = `${section.title} (${section.images.length} images)`;
  startBtn.disabled = false;
}

// Initialize wheel on page load
updateSectionWheel();

document.getElementById('sectionUp').addEventListener('click', () => {
  sectionIndex = (sectionIndex - 1 + imageSections.length) % imageSections.length;
  updateSectionWheel();
});

document.getElementById('sectionDown').addEventListener('click', () => {
  sectionIndex = (sectionIndex + 1) % imageSections.length;
  updateSectionWheel();
});


startBtn.addEventListener("click", () => {
  activeSection = imageSections[sectionIndex];

  // Load only this section’s images
  images = activeSection.images;

  // Reset state
  currentImageIndex = 0;
  morphStep = 0;
  isPaused = false;

  // Clear previous responses
  responsesDiv.innerHTML = "";

images.forEach((_, i) => {
  const numberPrefix = `${i+1}. `;
  const ta = document.createElement('textarea');

  ta.className = 'responseField';
  ta.id = `response${i+1}`;
  ta.value = numberPrefix;
  ta.disabled = false;

  // ✅ AUTO-EXPAND + SCOREBOARD SYNC
  ta.addEventListener("input", function () {
    // enforce numbering
    if (!this.value.startsWith(numberPrefix)) {
      const cursorPos = this.selectionStart;
      this.value =
        numberPrefix + this.value.replace(/^\d+\.\s*/, '');
      this.selectionStart = this.selectionEnd =
        Math.max(cursorPos, numberPrefix.length);
    }

    // ✅ auto-grow downward
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';

    updateScoreboardFromTextAreas();
  });

  responsesDiv.appendChild(ta);
});


  document.getElementById('response1').style.display = 'block';

  loadImages();

  // ✅ FORCE-ENABLE ALL CONTROLS INCLUDING SUBMIT
  document.getElementById('submitButton').disabled = false;
  document.getElementById('pauseButton').disabled = false;
  document.getElementById('nextButton').disabled = false;
  document.getElementById('backButton').disabled = false;
});


    let currentImageIndex = 0, isPaused = false, morphStep = 0;
    const totalSteps = 20, morphingSpeed = 50, displayTime = 120000;
    let morphingInterval, displayTimeout, timerInterval, imageElements = [], timeLeft = displayTime/1000;

    const canvas = document.getElementById('morphCanvas');
    const ctx = canvas.getContext('2d');
    const overlayNumber = document.getElementById('overlayNumber');
    const responsesDiv = document.getElementById('responses');
    const pauseButton = document.getElementById('pauseButton');
    const countdownOverlay = document.createElement('div');
    countdownOverlay.className = 'countdownOverlay';
    let interactionAllowed = false;

    

    function updateOverlay(index) {
      overlayNumber.style.display = showOverlayNumber ? "block" : "none";
      overlayNumber.textContent = index + 1;
    }

    function attachTimerToActiveField(index) {
      const activeInput = document.getElementById(`response${index+1}`);
      if(!activeInput) return;
      if(countdownOverlay.parentElement) countdownOverlay.parentElement.removeChild(countdownOverlay);
      activeInput.insertAdjacentElement("afterend", countdownOverlay);
    }

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = displayTime / 1000;
      updateTimer();
      timerInterval = setInterval(() => {
        if(!isPaused) {
          timeLeft--;
          updateTimer();
          if(timeLeft <= 0) clearInterval(timerInterval);
        }
      }, 1000);
    }

    function updateTimer() {
      const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
      const s = String(timeLeft%60).padStart(2,'0');
      countdownOverlay.textContent = `${m}:${s}`;
    }

    function loadImages() {
      const promises = images.map(src => new Promise(res => {
        const img = new Image();
        img.src = src;
        img.onload = () => res(img);
        img.onerror = () => res(new Image());
      }));

      Promise.all(promises).then(loaded => {
        imageElements = loaded;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(imageElements[0],0,0,canvas.width,canvas.height);
        updateOverlay(0);
        attachTimerToActiveField(0);
        startTimer();
        // displayTimeout = setTimeout(startMorphing, displayTime);

      });
    }

    function morphImages() {
      if(isPaused) return;
      const current = imageElements[currentImageIndex];
      const next = imageElements[(currentImageIndex + 1) % images.length];
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const alpha = morphStep / totalSteps;
      ctx.globalAlpha = 1 - alpha;
      ctx.drawImage(current,0,0,canvas.width,canvas.height);
      ctx.globalAlpha = alpha;
      ctx.drawImage(next,0,0,canvas.width,canvas.height);
      morphStep++;
      if(morphStep >= totalSteps) {
        clearInterval(morphingInterval);
        morphStep = 0;
        currentImageIndex = (currentImageIndex + 1) % images.length;
        showImage(currentImageIndex);
      }
    }

    function showImage(index) {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.globalAlpha = 1;
      ctx.drawImage(imageElements[index],0,0,canvas.width,canvas.height);
      updateOverlay(index);
      document.querySelectorAll('.responseField').forEach((el,i)=>{
        el.style.display = (i === index) ? 'block' : 'none';
        el.disabled = !interactionAllowed;
      });
      attachTimerToActiveField(index);
      startTimer();
      displayTimeout = setTimeout(startMorphing, displayTime);
    }

    function startMorphing() {
      morphingInterval = setInterval(morphImages, morphingSpeed);
    }

function fadeToImage(targetIndex) {
  clearInterval(morphingInterval);
  clearTimeout(displayTimeout);

  let step = 0;
  const current = imageElements[currentImageIndex];
  const next = imageElements[targetIndex];

  const fadeInterval = setInterval(() => {
    const alpha = step / totalSteps;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.globalAlpha = 1 - alpha;
    ctx.drawImage(current,0,0,canvas.width,canvas.height);
    ctx.globalAlpha = alpha;
    ctx.drawImage(next,0,0,canvas.width,canvas.height);
    step++;

    if(step > totalSteps) {
      clearInterval(fadeInterval);
      currentImageIndex = targetIndex;
      ctx.globalAlpha = 1;
      ctx.drawImage(next,0,0,canvas.width,canvas.height);

      updateOverlay(currentImageIndex);
      renderMCForImage(currentImageIndex);
      startTimer();
      displayTimeout = setTimeout(startMorphing, displayTime);
    }
  }, morphingSpeed);
}
    pauseButton.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseButton.textContent = isPaused ? 'Resume' : 'Pause';
      if(isPaused) {
        clearInterval(morphingInterval);
        clearTimeout(displayTimeout);
      } else {
        displayTimeout = setTimeout(startMorphing, displayTime);
      }
    });

    document.getElementById('nextButton').addEventListener('click', () => fadeToImage((currentImageIndex+1) % images.length));
    document.getElementById('backButton').addEventListener('click', () => fadeToImage((currentImageIndex-1+images.length) % images.length));

    function checkUnlock() {
      const nameFilled = document.getElementById('nameField').value.trim() !== "";
      const idFilled = document.getElementById('idField').value.trim() !== "";
      if(nameFilled && idFilled) {
        interactionAllowed = true;
        document.querySelectorAll('.controls button').forEach(b => b.disabled = false);
        document.querySelectorAll('.responseField').forEach(r => r.disabled = false);
      }
    }

    document.getElementById('nameField').addEventListener('input', checkUnlock);
    document.getElementById('idField').addEventListener('input', checkUnlock);

const scoreDataEl = document.getElementById('scoreData');
const copyMessage = document.getElementById('copyMessage');

/* nothing else that touches copyButton below this line */

document.getElementById('copyButton').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(scoreDataEl.innerText);

    copyMessage.style.opacity = 1;
    setTimeout(() => {
      copyMessage.style.opacity = 0;
    }, 1200);

  } catch (err) {
    alert("Failed to copy. Please copy manually.");
  }
});



    function updateTextAreasFromScoreboard() {
      const lines = scoreDataEl.innerText.split("\n");
      let currentIdx = null;
      let buffer = [];
      function flushBuffer() {
        if(currentIdx !== null) {
          const ta = document.getElementById(`response${currentIdx}`);
          if(ta) ta.value = `${currentIdx}. ` + buffer.join("\n").trim().replace(/^\d+\.\s*/, '');
        }
        buffer = [];
      }
      lines.forEach(line => {
        const match = line.match(/^(\d+)\.\s*(.*)$/);
        if(match){
          flushBuffer();
          currentIdx = parseInt(match[1], 10);
          buffer.push(match[2]);
        } else if(currentIdx !== null) {
          buffer.push(line);
        }
      });
      flushBuffer();
    }

function updateScoreboardFromTextAreas() {
  const name = document.getElementById('nameField').value;
  const id = document.getElementById('idField').value;

  // HTML filename
  const fileName = location.pathname.split("/").pop() || "index.html";

  // Section name
  const sectionName = activeSection ? activeSection.title : "";

  // International date, military time (YYYY-MM-DD HH:mm)
  const now = new Date();
  const date =
    now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2, "0") + "-" +
    String(now.getDate()).padStart(2, "0") + " " +
    String(now.getHours()).padStart(2, "0") + ":" +
    String(now.getMinutes()).padStart(2, "0");

  const responsesText = images
    .map((_, i) => document.getElementById(`response${i+1}`).value)
    .join("\n");

  scoreDataEl.innerText =
    `${fileName} | ${sectionName} | ${name} | ${id} | ${date}\n\n${responsesText}`;
}


    scoreDataEl.addEventListener('input', updateTextAreasFromScoreboard);

    document.getElementById('submitButton').addEventListener('click', () => {
      clearInterval(morphingInterval);
      clearTimeout(displayTimeout);
      updateTextAreasFromScoreboard();
      updateScoreboardFromTextAreas();
      document.getElementById('scoreboard').style.display='block';
      scoreDataEl.scrollTop = scoreDataEl.scrollHeight;
    });



    const script = document.createElement('script');
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    document.head.appendChild(script);

    document.getElementById('downloadPngButton').addEventListener('click', () => {
      const scoreboardControls = document.querySelector('#scoreboard .controls');
      scoreboardControls.style.display='none';
      html2canvas(document.getElementById('scoreboard')).then(canvas => {
        const link = document.createElement('a');
        link.href = canvas.toDataURL();
        link.download='responses.png';
        link.click();
        scoreboardControls.style.display='flex';
      });
    });

    document.getElementById('downloadTxtButton').addEventListener('click', () => {
      const blob = new Blob([scoreDataEl.innerText], {type:'text/plain'});
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'responses.txt';
      link.click();
    });

    const borderDiv = document.createElement('div');
    borderDiv.style.position='fixed';
    borderDiv.style.inset='0';
    borderDiv.style.border='12px solid #39FF14';
    borderDiv.style.boxSizing='border-box';
    borderDiv.style.zIndex='9999';
    borderDiv.style.pointerEvents='none';
    document.body.appendChild(borderDiv);



  </script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Get filename only
    let filename = window.location.pathname.split("/").pop();

    // Remove .html
    filename = filename.replace(/\.html$/i, "");

    // Remove everything up to and including the first underscore
    // (treats that as the prefix)
    filename = filename.replace(/^[^_]*_/, "");

    // Convert underscores to spaces
    const title = filename.replace(/_/g, " ");

    // Replace the first <h1>
    const h1 = document.querySelector("h1");
    if (h1) {
        h1.textContent = title;
    }
});
</script>

<script>
(function() {
  // Prevent pinch-to-zoom
  function preventPinch(e) {
    if (e.touches.length > 1) e.preventDefault();
  }

  // Prevent double-tap zoom
  let lastTouchTime = 0;
  function preventDoubleTap(e) {
    const now = Date.now();
    if (now - lastTouchTime < 300) {
      e.preventDefault();
    }
    lastTouchTime = now;
  }

  // Block gesture events on iOS
  function preventGesture(e) {
    e.preventDefault();
  }

  document.addEventListener('touchstart', preventPinch, { passive: false });
  document.addEventListener('touchend', preventDoubleTap, { passive: false });
  document.addEventListener('gesturestart', preventGesture, { passive: false });
})();
</script>

</body>
