<!DOCTYPE html>
<html>
<head>
  <title>Audio Sorter FAST REAL (Extended Split, Size-Safe, Date)</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    body { font-family: Arial; padding:20px; }
    #barContainer { width:100%; background:#ddd; height:20px; margin:10px 0;}
    #bar { width:0%; height:100%; background:green;}
  </style>
</head>
<body>

<h2>⚡ Audio Sorter FAST (Extended, Split, Size-Safe, Date)</h2>

<input type="file" id="files" multiple>
<button id="startBtn">Start Processing</button>

<h3 id="status">No files loaded</h3>
<div id="barContainer"><div id="bar"></div></div>

<p id="summary"></p>

<br>

<button onclick="downloadCategory('Songs')">Songs</button>
<button onclick="downloadCategory('Ringtones')">Ringtones</button>
<button onclick="downloadCategory('Short Melodic')">Short Melodic</button>
<button onclick="downloadCategory('Rhythmic')">Rhythmic</button>
<button onclick="downloadCategory('Ambient')">Ambient</button>
<button onclick="downloadCategory('Conversations')">Conversations</button>
<button onclick="downloadCategory('Sound Effects')">Sound Effects</button>
<button onclick="downloadCategory('Junk')">Junk</button>

<script>
let selectedFiles = [];
let results = [];

const statusEl = document.getElementById("status");
const bar = document.getElementById("bar");
const summaryEl = document.getElementById("summary");

// Load files
document.getElementById("files").onchange = e => {
  selectedFiles = Array.from(e.target.files);
  statusEl.innerText = `Loaded ${selectedFiles.length} files`;
};

// Start processing
document.getElementById("startBtn").onclick = async () => {
  if(selectedFiles.length === 0){
    alert("Select files first");
    return;
  }

  results = [];
  let count = 0;
  const total = selectedFiles.length;
  const counts = {};

  for(const file of selectedFiles){
    const percent = ((count/total)*100).toFixed(1);
    statusEl.innerText = `Processing ${count+1}/${total} (${percent}%) - ${file.name}`;

    const size = file.size;
    const category = categorize(size, file.name);

    results.push({ name: file.name, file, category });

    counts[category] = (counts[category] || 0) + 1;

    summaryEl.innerText = Object.entries(counts)
      .map(([k,v]) => `${k}: ${v}`)
      .join(" | ");

    count++;
    bar.style.width = ((count/total)*100) + "%";
    await new Promise(r => setTimeout(r, 1));
  }

  statusEl.innerText = "✅ Done (FAST, Extended, Size-Safe)";
};

// FAST HEURISTICS
function categorize(size, name){
  if(size < 8000) return "Junk";
  if(size < 15000) return "Sound Effects";
  if(size < 20000) return "Short Melodic";
  if(size < 80000) return "Ringtones";
  if(size < 200000) return "Rhythmic";
  if(size < 500000) return "Ambient";
  if(size >= 500000 && size < 1000000) return "Conversations";
  return "Songs";
}

// Download ZIP (split by size ~100MB per zip) with date suffix
async function downloadCategory(cat){
  const maxZipBytes = 100 * 1024 * 1024; // 100MB per ZIP approx.

  let items = results.filter(r => r.category === cat);
  if(items.length === 0){
    alert("No files in this category");
    return;
  }

  // sort small -> large to reduce memory pressure
  items.sort((a,b) => a.file.size - b.file.size);

  let currentChunk = [];
  let currentSize = 0;
  let zipIndex = 1;

  // get ISO date YYYY-MM-DD
  const today = new Date().toISOString().split('T')[0];

  for(const item of items){
    if(currentSize + item.file.size > maxZipBytes && currentChunk.length > 0){
      await generateAndDownloadZip(cat, currentChunk, zipIndex, today);
      zipIndex++;
      currentChunk = [];
      currentSize = 0;
    }
    currentChunk.push(item);
    currentSize += item.file.size;
  }

  if(currentChunk.length > 0){
    await generateAndDownloadZip(cat, currentChunk, zipIndex, today);
  }
}

// helper to generate & download one zip
async function generateAndDownloadZip(cat, chunk, index, date){
  const zip = new JSZip();
  let csv = "filename,category\r\n";

  for(const item of chunk){
    const prefix = cat.replace(/ /g,"_").toUpperCase();
    const filename = `${prefix}_${item.name}`;
    zip.file(filename, item.file);
    csv += `"${filename}","${cat}"\r\n`;
  }

  zip.file(`${cat}.csv`, new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"}));

  const blob = await zip.generateAsync({type:"blob"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;

  // Append date to filename
  const baseName = chunk.length > 1 || index>1 ? `${cat}_part${index}_${date}.zip` : `${cat}_${date}.zip`;
  a.download = baseName;

  document.body.appendChild(a);
  a.click();
  await new Promise(r => setTimeout(r, 1000));
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
